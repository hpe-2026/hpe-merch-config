# ───────────────────────── mTLS ─────────────────────────
# Default: require mTLS for all meshed services in this namespace.
# (The data layer — mongo/kafka/zookeeper — is NOT in the mesh, so it is
#  unaffected. promtail has no sidecar, so loki + loki-rbac-proxy must accept
#  plaintext from it.)
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: loki-permissive
spec:
  selector:
    matchLabels:
      app: loki
  mtls:
    mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: loki-rbac-proxy-permissive
spec:
  selector:
    matchLabels:
      app: loki-rbac-proxy
  mtls:
    mode: PERMISSIVE
---
# ───────────────────────── Ingress Gateway ─────────────────────────
# Host-based routing so each SPA is served at the root of its own hostname
# (avoids SPA base-path issues). Reach via the gateway NodePort, e.g.
#   Host: prod.nitte.local | admin.prod.nitte.local | merchant.prod.nitte.local
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: nitte-gateway
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "prod.nitte.local"
        - "admin.prod.nitte.local"
        - "merchant.prod.nitte.local"
        - "keycloak.prod.nitte.local"
        - "grafana.prod.nitte.local"
        - "prometheus.prod.nitte.local"
        - "jaeger.prod.nitte.local"
        - "minio.prod.nitte.local"
---
# Storefront (+ shared API / auth / grafana)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: storefront-routes
spec:
  hosts:
    - "prod.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - match:
        - uri: { prefix: /api }
      route:
        - destination: { host: node-backend, port: { number: 3000 } }
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure,refused-stream
    - match:
        - uri: { prefix: /auth }
        - uri: { prefix: /realms }
      route:
        - destination: { host: keycloak, port: { number: 8080 } }
    - match:
        - uri: { prefix: /grafana }
      route:
        - destination: { host: grafana, port: { number: 3000 } }
    - match:
        - uri: { prefix: / }
      route:
        - destination: { host: frontend, port: { number: 5173 } }
---
# Admin dashboard (served at root of admin.prod.nitte.local)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: admin-routes
spec:
  hosts:
    - "admin.prod.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - match:
        - uri: { prefix: /api }
      route:
        - destination: { host: node-backend, port: { number: 3000 } }
    - match:
        - uri: { prefix: /auth }
        - uri: { prefix: /realms }
      route:
        - destination: { host: keycloak, port: { number: 8080 } }
    - match:
        - uri: { prefix: / }
      route:
        - destination: { host: admin-dashboard, port: { number: 5174 } }
---
# Merchant portal (served at root of merchant.prod.nitte.local)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: merchant-routes
spec:
  hosts:
    - "merchant.prod.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - match:
        - uri: { prefix: /api }
      route:
        - destination: { host: node-backend, port: { number: 3000 } }
    - match:
        - uri: { prefix: /auth }
        - uri: { prefix: /realms }
      route:
        - destination: { host: keycloak, port: { number: 8080 } }
    - match:
        - uri: { prefix: / }
      route:
        - destination: { host: merchant-portal, port: { number: 5175 } }
---
# ───────────────────────── Observability / IAM / Storage UIs ─────────────────────────
# Each exposed on its own host so the admin-dashboard's serviceUrl() links resolve.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: keycloak-routes
spec:
  hosts:
    - "keycloak.prod.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: keycloak, port: { number: 8080 } }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: grafana-routes
spec:
  hosts:
    - "grafana.prod.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: grafana, port: { number: 3000 } }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: prometheus-routes
spec:
  hosts:
    - "prometheus.prod.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: prometheus, port: { number: 9090 } }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: jaeger-routes
spec:
  hosts:
    - "jaeger.prod.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: jaeger, port: { number: 16686 } }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
