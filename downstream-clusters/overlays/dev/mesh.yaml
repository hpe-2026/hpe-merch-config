# ───────────────────────── mTLS ─────────────────────────
# Default: require mTLS for all meshed services in this namespace.
# (The data layer — mongo/kafka/zookeeper — is NOT in the mesh, so it is
#  unaffected. promtail has no sidecar, so loki + loki-rbac-proxy must accept
#  plaintext from it.)
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: loki-permissive
spec:
  selector:
    matchLabels:
      app: loki
  mtls:
    mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: loki-rbac-proxy-permissive
spec:
  selector:
    matchLabels:
      app: loki-rbac-proxy
  mtls:
    mode: PERMISSIVE
---
# Kiali (istio-system, no sidecar) scrapes these in plaintext; allow it.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: prometheus-permissive
spec:
  selector:
    matchLabels:
      app: prometheus
  mtls:
    mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: jaeger-permissive
spec:
  selector:
    matchLabels:
      app: jaeger
  mtls:
    mode: PERMISSIVE
---
# ───────────────────────── Ingress Gateway ─────────────────────────
# Host-based routing so each SPA is served at the root of its own hostname
# (avoids SPA base-path issues). Reach via the gateway NodePort, e.g.
#   Host: dev.nitte.local | admin.dev.nitte.local | merchant.dev.nitte.local
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: nitte-gateway
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "dev.nitte.local"
        - "admin.dev.nitte.local"
        - "merchant.dev.nitte.local"
        - "keycloak.dev.nitte.local"
        - "grafana.dev.nitte.local"
        - "prometheus.dev.nitte.local"
        - "jaeger.dev.nitte.local"
        - "minio.dev.nitte.local"
        - "kiali.nitte.local"
        - "jenkins.nitte.local"
        - "redoc.dev.nitte.local"
        - "goalert.nitte.local"
---
# Storefront (+ shared API / auth / grafana)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: storefront-routes
spec:
  hosts:
    - "dev.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - match:
        - uri: { prefix: /api }
      route:
        - destination: { host: node-backend, port: { number: 3000 } }
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure,refused-stream
    - match:
        - uri: { prefix: /auth }
        - uri: { prefix: /realms }
      route:
        - destination: { host: keycloak, port: { number: 8080 } }
    - match:
        - uri: { prefix: /grafana }
      route:
        - destination: { host: grafana, port: { number: 3000 } }
    - match:
        - uri: { prefix: / }
      route:
        - destination: { host: frontend, port: { number: 5173 } }
---
# Admin dashboard (served at root of admin.dev.nitte.local)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: admin-routes
spec:
  hosts:
    - "admin.dev.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - match:
        - uri: { prefix: /api }
      route:
        - destination: { host: node-backend, port: { number: 3000 } }
    - match:
        - uri: { prefix: /auth }
        - uri: { prefix: /realms }
      route:
        - destination: { host: keycloak, port: { number: 8080 } }
    - match:
        - uri: { prefix: / }
      route:
        - destination: { host: admin-dashboard, port: { number: 5174 } }
---
# Merchant portal (served at root of merchant.dev.nitte.local)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: merchant-routes
spec:
  hosts:
    - "merchant.dev.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - match:
        - uri: { prefix: /api }
      route:
        - destination: { host: node-backend, port: { number: 3000 } }
    - match:
        - uri: { prefix: /auth }
        - uri: { prefix: /realms }
      route:
        - destination: { host: keycloak, port: { number: 8080 } }
    - match:
        - uri: { prefix: / }
      route:
        - destination: { host: merchant-portal, port: { number: 5175 } }
---
# ───────────────────────── Observability / IAM / Storage UIs ─────────────────────────
# Each exposed on its own host so the admin-dashboard's serviceUrl() links resolve.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: keycloak-routes
spec:
  hosts:
    - "keycloak.dev.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: keycloak, port: { number: 8080 } }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: grafana-routes
spec:
  hosts:
    - "grafana.dev.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: grafana, port: { number: 3000 } }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: prometheus-routes
spec:
  hosts:
    - "prometheus.dev.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: prometheus, port: { number: 9090 } }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: jaeger-routes
spec:
  hosts:
    - "jaeger.dev.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: jaeger, port: { number: 16686 } }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: minio-routes
spec:
  hosts:
    - "minio.dev.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: minio, port: { number: 9001 } }
---
# Kiali — Istio service-mesh console (cluster-wide, lives in istio-system).
# Exposed on a single, env-less host since it observes all namespaces.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: kiali-routes
spec:
  hosts:
    - "kiali.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination:
            host: kiali.istio-system.svc.cluster.local
            port: { number: 20001 }
---
# Jenkins CI (lives in the `jenkins` namespace, Helm-installed). Cross-namespace route.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: jenkins-routes
spec:
  hosts:
    - "jenkins.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination:
            host: jenkins.jenkins.svc.cluster.local
            port: { number: 8080 }
---
# Redoc API docs — /api proxied to backend so the spec loads same-origin.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: redoc-routes
spec:
  hosts:
    - "redoc.dev.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - match:
        - uri: { prefix: /api }
      route:
        - destination: { host: node-backend, port: { number: 3000 } }
    - match:
        - uri: { prefix: / }
      route:
        - destination: { host: redoc, port: { number: 80 } }
---
# GoAlert — central alerting/on-call (lives in the `goalert` namespace, out-of-band).
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: goalert-routes
spec:
  hosts:
    - "goalert.nitte.local"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination:
            host: goalert.goalert.svc.cluster.local
            port: { number: 8081 }

---
# ───────────────────────── Destination Rules ─────────────────────────
# Traffic policies for services inside the mesh.
# These configure connection pools and basic resilience without affecting routing.

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: node-backend-dr
spec:
  host: node-backend
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: DEFAULT
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
        maxRequestsPerConnection: 10
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 50

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: python-service-dr
spec:
  host: python-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 25
        http2MaxRequests: 50
        maxRetries: 2
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: frontend-dr
spec:
  host: frontend
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 200
      http:
        http1MaxPendingRequests: 100

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: keycloak-dr
spec:
  host: keycloak
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 150
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 150
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 60s
      baseEjectionTime: 120s
      maxEjectionPercent: 30

---
# ───────────────────────── Authorization Policies ─────────────────────────
# Basic access control for services inside the mesh.

apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: backend-api-access
spec:
  selector:
    matchLabels:
      app: node-backend
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/nitte-dev/sa/default"
      to:
        - operation:
            ports:
              - "3000"

    - from:
        - source:
            namespaces:
              - istio-system
      to:
        - operation:
            ports:
              - "3000"

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: python-service-access
spec:
  selector:
    matchLabels:
      app: python-service
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/nitte-dev/sa/default"
      to:
        - operation:
            ports:
              - "8000"

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: keycloak-access
spec:
  selector:
    matchLabels:
      app: keycloak
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/nitte-dev/sa/default"
      to:
        - operation:
            ports:
              - "8080"

    - from:
        - source:
            namespaces:
              - istio-system
      to:
        - operation:
            ports:
              - "8080"                                  