# ───────────────────────── mTLS ─────────────────────────
# STRICT — all in-mesh traffic must use mTLS.
# nginx Ingress is removed from the data path; all inbound traffic now enters
# through the Istio ingressgateway (Envoy L7), which speaks mTLS to sidecars.
# The data layer (mongo/kafka/zookeeper) is NOT in the mesh — unaffected.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: loki-permissive
spec:
  selector:
    matchLabels:
      app: loki
  mtls:
    mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: loki-rbac-proxy-permissive
spec:
  selector:
    matchLabels:
      app: loki-rbac-proxy
  mtls:
    mode: PERMISSIVE
---
# Kiali (istio-system, no sidecar) scrapes these in plaintext; allow it.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: prometheus-permissive
spec:
  selector:
    matchLabels:
      app: prometheus
  mtls:
    mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: jaeger-permissive
spec:
  selector:
    matchLabels:
      app: jaeger
  mtls:
    mode: PERMISSIVE
---
# ───────────────────────── Ingress Gateway ─────────────────────────
# Host-based routing using the existing nip.io hostnames the team already uses.
# Istio ingressgateway IP: 192.168.56.201 (MetalLB LoadBalancer on dev cluster).
# All *.192.168.56.201.nip.io requests route through Envoy L7 — no nginx needed.
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: nitte-gateway
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "frontend.192.168.56.201.nip.io"
        - "admin.192.168.56.201.nip.io"
        - "merchant.192.168.56.201.nip.io"
        - "api.192.168.56.201.nip.io"
        - "keycloak.192.168.56.201.nip.io"
        - "grafana.192.168.56.201.nip.io"
        - "prometheus.192.168.56.201.nip.io"
        - "jaeger.192.168.56.201.nip.io"
        - "minio.192.168.56.201.nip.io"
        - "kiali.192.168.56.201.nip.io"
        - "redoc.192.168.56.201.nip.io"
---
# Storefront (+ shared API / auth / grafana)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: storefront-routes
spec:
  hosts:
    - "frontend.192.168.56.201.nip.io"
  gateways:
    - nitte-gateway
  http:
    - match:
        - uri: { prefix: /api }
      route:
        - destination: { host: node-backend, port: { number: 3000 } }
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure,refused-stream
    - match:
        - uri: { prefix: /auth }
        - uri: { prefix: /realms }
      route:
        - destination: { host: keycloak, port: { number: 8080 } }
    - match:
        - uri: { prefix: /grafana }
      route:
        - destination: { host: grafana, port: { number: 3000 } }
    - match:
        - uri: { prefix: / }
      route:
        - destination: { host: frontend, port: { number: 5173 } }
---
# Admin dashboard
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: admin-routes
spec:
  hosts:
    - "admin.192.168.56.201.nip.io"
  gateways:
    - nitte-gateway
  http:
    - match:
        - uri: { prefix: /api }
      route:
        - destination: { host: node-backend, port: { number: 3000 } }
    - match:
        - uri: { prefix: /auth }
        - uri: { prefix: /realms }
      route:
        - destination: { host: keycloak, port: { number: 8080 } }
    - match:
        - uri: { prefix: / }
      route:
        - destination: { host: admin-dashboard, port: { number: 5174 } }
---
# Merchant portal
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: merchant-routes
spec:
  hosts:
    - "merchant.192.168.56.201.nip.io"
  gateways:
    - nitte-gateway
  http:
    - match:
        - uri: { prefix: /api }
      route:
        - destination: { host: node-backend, port: { number: 3000 } }
    - match:
        - uri: { prefix: /auth }
        - uri: { prefix: /realms }
      route:
        - destination: { host: keycloak, port: { number: 8080 } }
    - match:
        - uri: { prefix: / }
      route:
        - destination: { host: merchant-portal, port: { number: 5175 } }
---
# ───────────────────────── Observability / IAM / Storage UIs ─────────────────────────
# API direct access (mirrors the /api route on storefront but under its own hostname)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-routes
spec:
  hosts:
    - "api.192.168.56.201.nip.io"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: node-backend, port: { number: 3000 } }
---
# Each exposed on its own host so the admin-dashboard's serviceUrl() links resolve.
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: keycloak-routes
spec:
  hosts:
    - "keycloak.192.168.56.201.nip.io"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: keycloak, port: { number: 8080 } }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: grafana-routes
spec:
  hosts:
    - "grafana.192.168.56.201.nip.io"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: grafana, port: { number: 3000 } }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: prometheus-routes
spec:
  hosts:
    - "prometheus.192.168.56.201.nip.io"
  gateways:
