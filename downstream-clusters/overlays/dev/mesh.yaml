---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: jaeger-routes
spec:
  hosts:
    - "jaeger.192.168.56.201.nip.io"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: jaeger, port: { number: 16686 } }
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: minio-routes
spec:
  hosts:
    - "minio.192.168.56.201.nip.io"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination: { host: minio, port: { number: 9001 } }
---
# Kiali — Istio service-mesh console (lives in istio-system on dev cluster).
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: kiali-routes
spec:
  hosts:
    - "kiali.192.168.56.201.nip.io"
  gateways:
    - nitte-gateway
  http:
    - route:
        - destination:
            host: kiali.istio-system.svc.cluster.local
            port: { number: 20001 }
---
# Redoc API docs
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: redoc-routes
spec:
  hosts:
    - "redoc.192.168.56.201.nip.io"
  gateways:
    - nitte-gateway
  http:
    - match:
        - uri: { prefix: /api }
      route:
        - destination: { host: node-backend, port: { number: 3000 } }
    - match:
        - uri: { prefix: / }
      route:
        - destination: { host: redoc, port: { number: 80 } }

---
# ───────────────────────── Destination Rules ─────────────────────────
# Traffic policies for services inside the mesh.
# These configure connection pools and basic resilience without affecting routing.

apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: node-backend-dr
spec:
  host: node-backend
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: DEFAULT
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
        maxRequestsPerConnection: 10
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 50

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: python-service-dr
spec:
  host: python-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 25
        http2MaxRequests: 50
        maxRetries: 2
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: frontend-dr
spec:
  host: frontend
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 200
      http:
        http1MaxPendingRequests: 100

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: keycloak-dr
spec:
  host: keycloak
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 150
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 150
        maxRetries: 3
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 60s
      baseEjectionTime: 120s
      maxEjectionPercent: 30

---
# ───────────────────────── Authorization Policies ─────────────────────────
# Basic access control for services inside the mesh.

apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: backend-api-access
spec:
  selector:
    matchLabels:
      app: node-backend
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/nitte-dev/sa/default"
      to:
        - operation:
            ports:
              - "3000"

    - from:
        - source:
            namespaces:
              - istio-system
      to:
        - operation:
            ports:
              - "3000"

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: python-service-access
spec:
  selector:
    matchLabels:
      app: python-service
  rules:
    # node-backend calls python-service (both run as default SA in nitte-dev)
    - from:
        - source:
            principals:
              - "cluster.local/ns/nitte-dev/sa/default"
      to:
        - operation:
            ports:
              - "8000"
    # Allow ingressgateway (istio-system) in case a direct route is ever added
    - from:
        - source:
            namespaces:
              - istio-system
      to:
        - operation:
            ports:
              - "8000"

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: keycloak-access
spec:
  selector:
    matchLabels:
      app: keycloak
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/nitte-dev/sa/default"
      to:
        - operation:
            ports:
              - "8080"

    - from:
        - source:
            namespaces:
              - istio-system
      to:
        - operation:
            ports:
              - "8080"                                  