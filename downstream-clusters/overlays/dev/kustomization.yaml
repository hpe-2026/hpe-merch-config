apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nitte-dev

resources:
  - namespace.yaml
  - ../../base
  - mesh.yaml

# Pin every workload in this environment to the dev worker node,
# and point the Keycloak admin console at the gateway host.
patches:
  - target:
      kind: Deployment
      name: keycloak
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: keycloak
      spec:
        template:
          spec:
            containers:
              - name: keycloak
                env:
                  - name: KC_HOSTNAME_URL
                    value: "http://keycloak.192.168.56.200.nip.io"
                  - name: KC_PROXY
                    value: "edge"
  - target:
      kind: Deployment
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ignored
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: workervm1
  - target:
      kind: Job
    patch: |-
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: ignored
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: workervm1
  - target:
      kind: DaemonSet
    patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: ignored
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: workervm1
  - target:
      kind: StatefulSet
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: ignored
      spec:
        template:
          spec:
            nodeSelector:
              kubernetes.io/hostname: workervm1
  # ── Scale down observability services that already run on admin cluster ──
  - target:
      kind: Deployment
      name: grafana
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: grafana
      spec:
        replicas: 0
  - target:
      kind: Deployment
      name: loki
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: loki
      spec:
        replicas: 0
  - target:
      kind: Deployment
      name: loki-rbac-proxy
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: loki-rbac-proxy
      spec:
        replicas: 0
  - target:
      kind: Deployment
      name: alertmanager
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: alertmanager
      spec:
        replicas: 0
  - target:
      kind: Deployment
      name: prometheus
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: prometheus
      spec:
        replicas: 0
  
