# Prometheus Agent — deployed on Dev (192.168.56.11) and Prod (192.168.56.12)
# Runs in Agent Mode: disables local TSDB, scrapes local services only,
# and ships all metrics to the Thanos Receiver on the Admin cluster via remote_write.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-agent-config
  namespace: nitte
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: "${CLUSTER_NAME}"   # Set per overlay: dev or prod
        environment: "${CLUSTER_ENV}"

    # Remote write to Thanos Receiver on Admin cluster (192.168.56.10)
    remote_write:
      - url: http://192.168.56.10:19291/api/v1/receive
        # Write-Ahead Log buffers metrics during network disconnect
        queue_config:
          max_samples_per_send: 1000
          max_shards: 5
          capacity: 2500
        metadata_config:
          send: true

    scrape_configs:
      - job_name: node-backend
        metrics_path: /metrics
        static_configs:
          - targets: ['node-backend.nitte.svc.cluster.local:3000']
            labels:
              service: node-backend

      - job_name: python-service
        metrics_path: /metrics
        static_configs:
          - targets: ['python-service.nitte.svc.cluster.local:8000']
            labels:
              service: python-service

      - job_name: notification-service
        metrics_path: /metrics
        static_configs:
          - targets: ['notification-service.nitte.svc.cluster.local:9100']
            labels:
              service: notification-service

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [nitte]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-agent
  namespace: nitte
  labels:
    app: prometheus-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-agent
  template:
    metadata:
      labels:
        app: prometheus-agent
    spec:
      serviceAccountName: prometheus-agent
      containers:
      - name: prometheus
        image: prom/prometheus:v2.48.0
        imagePullPolicy: IfNotPresent
        args:
        - '--enable-feature=agent'               # Agent Mode: no local TSDB
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.agent.path=/prometheus-agent'
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: prometheus-agent-config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
          readOnly: true
        - name: agent-data
          mountPath: /prometheus-agent
        env:
        - name: CLUSTER_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace   # Overridden per cluster via overlay
        - name: CLUSTER_ENV
          value: "dev"   # Override to "prod" in prod overlay
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
      volumes:
      - name: prometheus-agent-config
        configMap:
          name: prometheus-agent-config
      - name: agent-data
        emptyDir: {}

---
# RBAC for Prometheus Agent to discover pods in the cluster
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-agent
  namespace: nitte

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-agent
rules:
- apiGroups: [""]
  resources: [nodes, nodes/proxy, services, endpoints, pods]
  verbs: [get, list, watch]
- apiGroups: [extensions]
  resources: [ingresses]
  verbs: [get, list, watch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-agent
subjects:
- kind: ServiceAccount
  name: prometheus-agent
  namespace: nitte
