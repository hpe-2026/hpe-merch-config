apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-k8s-config
  namespace: nitte-dev
data:
  config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: info

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://192.168.56.10:30200/loki/api/v1/push
        # 30200 = NodePort of loki-rbac-proxy on Admin cluster (see observability-ingress.yaml)
        tenant_id: default
        headers:
          X-Promtail-Api-Key: promtail-loki-secret

    scrape_configs:
      - job_name: pod-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: pod-logs
              __path__: /var/log/pods/nitte-dev_*/*/*.log
        pipeline_stages:
          - cri: {}
          - regex:
              expression: '/var/log/pods/nitte-dev_(?P<service>[a-z][-a-z0-9]*?)(?:-[a-z0-9]{5,10}){1,2}_[^/]+/(?P<container>[^/]+)/'
          - labels:
              service:
              container:
          - labeldrop:
              - filename
      - job_name: waf-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: coraza-waf
              cluster: dev
              __path__: /var/log/pods/istio-system_istio-ingressgateway-*/*/*.log
        pipeline_stages:
          - cri: {}
          - match:
              selector: '{job="coraza-waf"}'
              stages:
                - regex:
                    # Actual Coraza WASM log format (Envoy/Istio OWASP CRS 4.x):
                    # 2026-...Z  critical  envoy wasm ...  wasm log istio-system.coraza-waf:
                    # [client "IP"] Coraza: Warning. ... [id "942100"] ... [severity "critical"] ... [uri "/path"]
                    expression: 'wasm log istio-system\.coraza-waf:.*\[id "(?P<rule_id>\d+)"\].*\[severity "(?P<waf_level>[^"]+)"\].*\[uri "(?P<uri>[^"]+)"\]'
                - regex:
                    # Extract attack type from tag if present (e.g. [tag "attack-sqli"] -> attack_type=sqli)
                    # Only present on Warning lines, not on Access-denied/blocking-evaluation lines
                    expression: '\[tag "attack-(?P<attack_type>[^"]+)"\]'
                - labels:
                    waf_level:
                    rule_id:
                    attack_type:
                    uri:
                - metrics:
                    waf_attacks_total:
                      type: Counter
                      description: "Total WAF attack detections by rule and type"
                      source: rule_id
                      config:
                        action: inc
          - labeldrop:
              - filename
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: nitte-dev
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: promtail
      tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      containers:
      - name: promtail
        image: grafana/promtail:2.9.4
        imagePullPolicy: IfNotPresent
        args: ["-config.file=/etc/promtail/config.yml"]
        ports:
        - containerPort: 9080
          name: http-metrics
        volumeMounts:
        - name: promtail-config
          mountPath: /etc/promtail/config.yml
          subPath: config.yml
          readOnly: true
        - name: pods-logs
          mountPath: /var/log/pods
          readOnly: true
        - name: containers-logs
          mountPath: /var/log/containers
          readOnly: true
        - name: docker-containers
          mountPath: /var/lib/docker/containers
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: promtail-config
        configMap:
          name: promtail-k8s-config
          items:
          - key: config.yml
            path: config.yml
      - name: pods-logs
        hostPath:
          path: /var/log/pods
      - name: containers-logs
        hostPath:
          path: /var/log/containers
      - name: docker-containers
        hostPath:
          path: /var/lib/docker/containers
