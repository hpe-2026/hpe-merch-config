# Coraza WAF — Istio WasmPlugin
# SecRuleEngine Off: logs violations but does NOT block traffic.
# This allows all HTTP methods (PUT/DELETE/PATCH) while still monitoring.
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: coraza-waf
  namespace: istio-system
  labels:
    app.kubernetes.io/name: coraza-waf
    app.kubernetes.io/component: security
    app.kubernetes.io/managed-by: argocd
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  url: oci://ghcr.io/corazawaf/coraza-proxy-wasm:0.6.0
  phase: AUTHN
  priority: 10
  pluginConfig:
    default_directives: "default"
    directives_map:
      default:
        - "SecRuleEngine Off"
        - "Include @demo-conf"
        - "Include @crs-setup-conf"
        - "Include @owasp_crs/*.conf"
        - "SecAction \"id:900000,phase:1,nolog,pass,t:none,setvar:tx.paranoia_level=1\""
        - "SecRule REQUEST_URI \"@beginsWith /realms\" \"id:1000,phase:1,pass,nolog,ctl:ruleRemoveTargetById=200001;REQUEST_BODY\""
        - "SecRule REQUEST_URI \"@beginsWith /auth\" \"id:1001,phase:1,pass,nolog,ctl:ruleRemoveTargetById=200001;REQUEST_BODY\""
        - "SecRule REQUEST_URI \"@beginsWith /api/v1/images\" \"id:1002,phase:1,pass,nolog,ctl:ruleRemoveById=920230\""
        - "SecRule REQUEST_URI \"@beginsWith /api/client\" \"id:1003,phase:1,pass,nolog,ctl:ruleRemoveTargetById=942100;REQUEST_BODY\""
        - "SecAuditEngine RelevantOnly"
        - "SecAuditLogParts ABIJDEFHZ"
        - "SecAuditLog /dev/stdout"
