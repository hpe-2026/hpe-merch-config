# Ingress rules for dev cluster — accessible via *.192.168.56.200.nip.io
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nitte-dev-ingress
  namespace: nitte
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  - host: frontend.192.168.56.200.nip.io
    http:
      paths:
      # /api -> node-backend so relative image URLs (/api/v1/upload/images/...) resolve same-origin
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: node-backend
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 5173
  - host: admin.192.168.56.200.nip.io
    http:
      paths:
      # /api -> node-backend so relative image URLs (/api/v1/upload/images/...) resolve same-origin
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: node-backend
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-dashboard
            port:
              number: 5174
  - host: merchant.192.168.56.200.nip.io
    http:
      paths:
      # /api -> node-backend so relative image URLs (/api/v1/upload/images/...) resolve same-origin
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: node-backend
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: merchant-portal
            port:
              number: 5175
  - host: api.192.168.56.200.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: node-backend
            port:
              number: 3000
  - host: keycloak.192.168.56.200.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: keycloak
            port:
              number: 8080
  - host: jaeger.192.168.56.200.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jaeger
            port:
              number: 16686
  - host: redoc.192.168.56.200.nip.io
    http:
      paths:
      # /api -> node-backend so Redoc can load /api/v1/openapi.json same-origin
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: node-backend
            port:
              number: 3000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: redoc
            port:
              number: 80
