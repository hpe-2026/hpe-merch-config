apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-service
  namespace: nitte
  labels:
    app: python-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-service
  template:
    metadata:
      labels:
        app: python-service
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      initContainers:
      - name: wait-for-mongodb
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z mongodb 27017; do echo "waiting for mongodb"; sleep 2; done']
      containers:
      - name: python-service
        image: python-service:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: MONGODB_URL
          value: "mongodb://mongodb:27017/nitte_merch"
        - name: DATABASE_NAME
          value: nitte_merch
        - name: API_GATEWAY_URL
          value: "http://node-backend:3000"
        - name: JAEGER_AGENT_HOST
          value: jaeger
        - name: JAEGER_AGENT_PORT
          value: "6831"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: python-service
  namespace: nitte
spec:
  selector:
    app: python-service
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
