# ConfigMaps required by the Keycloak deployment:
#   1. keycloak-realm-config   — nitte-realm.json (auto-imported on startup)
#   2. keycloak-spi-config     — event listener JAR (optional, empty placeholder)
#   3. promtail-keycloak-config — promtail sidecar config for Keycloak logs

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-spi-config
  namespace: nitte
binaryData:
  # Real keycloak-event-listener JAR (edu.nitte.keycloak) embedded as base64.
  # Registers provider id "nitte-notification-event-listener" (matches the realm's
  # eventsListeners) and POSTs user/login events to NOTIFICATION_SERVICE_URL.
  # An empty placeholder here caused "Event listener registered, but provider not found".
  keycloak-event-listener-1.0.0.jar: 

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-keycloak-config
  namespace: nitte
data:
  promtail-keycloak-config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: keycloak
        static_configs:
          - targets:
              - localhost
            labels:
              job: keycloak
              __path__: /var/log/keycloak/*.log
