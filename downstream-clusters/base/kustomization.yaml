apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# All workload manifests for the NITTE platform (one full stack).
# ConfigMaps and Secrets are bootstrapped out-of-band (not managed here).
resources:
  - pvcs.yaml
  - mongodb.yaml
  - mongo-sharding-init-configmap.yaml
  - kafka.yaml
  - postgres-keycloak.yaml
  - keycloak.yaml
  - keycloak-configmaps.yaml
  - keycloak-realm-configmap.yaml
  - minio.yaml
  - minio-init.yaml
  - node-backend.yaml
  - python-service.yaml
  - frontend.yaml
  - nginx-configmaps.yaml
  - admin-dashboard.yaml
  - merchant-portal.yaml
  - notification-service.yaml
  - prometheus.yaml
  - grafana.yaml
  - alertmanager.yaml
  - loki.yaml
  # promtail (DaemonSet + RBAC + config) is owned exclusively by the
  # monitoring-agents-dev/prod ArgoCD app. Declaring it here too caused a
  # SharedResourceWarning tug-of-war that kept downstream-dev OutOfSync/Progressing.
  - loki-rbac-proxy.yaml
  - jaeger.yaml
  - redocly.yaml
  - mongo-backup.yaml
  - dev-ingress.yaml
  - unleash.yaml
# Rewrite local image names to the Nexus registry
images:
  - name: node-backend
    newName: 192.168.56.10:30082/merch-docker/node-backend
    newTag: "5529a48"
  - name: python-service
    newName: 192.168.56.10:30082/merch-docker/python-service
    newTag: 5529a48
  - name: frontend
    newName: 192.168.56.10:30082/merch-docker/frontend
    newTag: "f50df7b"
  - name: admin-dashboard
    newName: 192.168.56.10:30082/merch-docker/admin-dashboard
    newTag: "5529a48"
  - name: merchant-portal
    newName: 192.168.56.10:30082/merch-docker/merchant-portal
    newTag: "5529a48"
  - name: notification-service
    newName: 192.168.56.10:30082/merch-docker/notification-service
    newTag: 5529a48
  - name: loki-rbac-proxy
    newName: 192.168.56.10:30082/loki-rbac-proxy
# Mount the correct nginx.conf (per app port) over the baked-in default
patches:
  - path: patch-frontend-nginx.yaml
    target:
      kind: Deployment
      name: frontend
  - path: patch-admin-nginx.yaml
    target:
      kind: Deployment
      name: admin-dashboard
  - path: patch-merchant-nginx.yaml
    target:
      kind: Deployment
      name: merchant-portal
