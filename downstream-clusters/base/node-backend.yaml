apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-backend
  namespace: nitte
  labels:
    app: node-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-backend
  template:
    metadata:
      labels:
        app: node-backend
    spec:
      initContainers:
      - name: wait-for-mongodb
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z mongodb 27017; do echo "waiting for mongodb"; sleep 2; done']
      - name: wait-for-keycloak
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z keycloak 8080; do echo "waiting for keycloak"; sleep 5; done']
      - name: wait-for-python-service
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z python-service 8000; do echo "waiting for python-service"; sleep 2; done']
      containers:
      - name: node-backend
        image: node-backend:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "3000"
        - name: MONGODB_URL
          value: "mongodb://mongodb:27017/nitte_merch"
        - name: PYTHON_SERVICE_URL
          value: "http://python-service:8000"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: nitte-secrets
              key: JWT_SECRET
        - name: JWT_EXPIRY
          value: 7d
        - name: KEYCLOAK_SERVER_URL
          value: "http://keycloak:8080"
        - name: KEYCLOAK_REALM
          value: nitte-realm
        - name: KEYCLOAK_CLIENT_ID
          value: nitte-client
        - name: KEYCLOAK_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: nitte-secrets
              key: KEYCLOAK_CLIENT_SECRET
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: API_BASE
          value: "http://node-backend:3000"
        - name: CORS_ORIGINS
          value: "http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175"
        - name: LOG_LEVEL
          value: info
        - name: REQUEST_TIMEOUT
          value: "30000"
        - name: RAZORPAY_KEY_ID
          valueFrom:
            secretKeyRef:
              name: nitte-secrets
              key: RAZORPAY_KEY_ID
        - name: RAZORPAY_KEY_SECRET
          valueFrom:
            secretKeyRef:
              name: nitte-secrets
              key: RAZORPAY_KEY_SECRET
        - name: KEYCLOAK_ADMIN
          valueFrom:
            secretKeyRef:
              name: nitte-secrets
              key: KEYCLOAK_ADMIN
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nitte-secrets
              key: KEYCLOAK_ADMIN_PASSWORD
        - name: S3_ENDPOINT
          value: "http://minio:9000"
        - name: S3_PUBLIC_ENDPOINT
          value: "http://localhost:9000"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: nitte-secrets
              key: MINIO_ROOT_USER
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: nitte-secrets
              key: MINIO_ROOT_PASSWORD
        - name: S3_PRODUCTS_BUCKET
          value: "nitte-products"
        - name: AWS_REGION
          value: "us-east-1"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: node-backend
  namespace: nitte
spec:
  selector:
    app: node-backend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
