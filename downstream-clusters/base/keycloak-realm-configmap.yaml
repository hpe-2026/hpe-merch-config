apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: nitte
data:
  nitte-users-realm.json: |
    {
      "id": "nitte-users",
      "realm": "nitte-users",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": true,
      "resetPasswordAllowed": true,
      "bruteForceProtected": true,
      "loginTheme": "nitte",
      "roles": {
        "realm": [
          {
            "name": "platform-admin",
            "description": "[RBAC] Platform administrator with full system access"
          },
          {
            "name": "alumni-verified",
            "description": "[RBAC] Verified alumni with purchasing access"
          },
          {
            "name": "non_alumni",
            "description": "Non-alumni user with limited access"
          },
          {
            "name": "mongo_writer",
            "description": "Internal service role for MongoDB write access"
          }
        ]
      },
      "clients": [
        {
          "clientId": "nitte-client",
          "enabled": true,
          "publicClient": false,
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": true,
          "redirectUris": [
            "http://frontend.192.168.56.200.nip.io/*",
            "http://admin.192.168.56.200.nip.io/*"
          ],
          "webOrigins": [
            "http://frontend.192.168.56.200.nip.io",
            "http://admin.192.168.56.200.nip.io"
          ],
          "defaultClientScopes": [
            "openid",
            "profile",
            "email",
            "roles"
          ],
          "protocolMappers": [
            {
              "name": "realm-roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "config": {
                "claim.name": "realm_access.roles",
                "jsonType.label": "String",
                "multivalued": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "client-roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-client-role-mapper",
              "config": {
                "claim.name": "resource_access.${client_id}.roles",
                "jsonType.label": "String",
                "multivalued": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true",
                "usermodel.clientRoleMapping.clientId": "nitte-client"
              }
            }
          ],
          "secret": "nitte-client-secret",
          "serviceAccountsEnabled": true,
          "fullScopeAllowed": true
        },
        {
          "clientId": "nitte-backend",
          "enabled": true,
          "publicClient": false,
          "serviceAccountsEnabled": true,
          "secret": "nitte-backend-secret"
        }
      ],
      "users": [
        {
          "username": "admin@nitte.edu",
          "email": "admin@nitte.edu",
          "enabled": true,
          "emailVerified": true,
          "realmRoles": [
            "platform-admin"
          ],
          "clientRoles": {
            "nitte-client": [
              "product:create",
              "product:update",
              "product:delete",
              "product:read-all",
              "order:create",
              "order:update",
              "order:read-all",
              "user:manage"
            ]
          },
          "credentials": [
            {
              "type": "password",
              "value": "admin@123",
              "temporary": false
            }
          ]
        },
        {
          "username": "alumni@nitte.edu",
          "email": "alumni@nitte.edu",
          "enabled": true,
          "emailVerified": true,
          "realmRoles": [
            "alumni-verified"
          ],
          "clientRoles": {
            "nitte-client": [
              "order:create",
              "order:update",
              "order:read-own"
            ]
          },
          "credentials": [
            {
              "type": "password",
              "value": "alumni@123",
              "temporary": false
            }
          ]
        },
        {
          "username": "guest_user",
          "email": "guest_user@alumni-shop.local",
          "enabled": true,
          "realmRoles": [
            "non_alumni"
          ],
          "credentials": [
            {
              "type": "password",
              "value": "Guest@123",
              "temporary": false
            }
          ]
        },
        {
          "username": "service-account-nitte-client",
          "enabled": true,
          "serviceAccountClientId": "nitte-client",
          "realmRoles": [
            "mongo_writer"
          ],
          "clientRoles": {
            "realm-management": [
              "manage-users",
              "view-users",
              "query-users",
              "manage-realm",
              "view-realm"
            ]
          }
        }
      ],
      "eventsListeners": [
        "jboss-logging",
        "nitte-notification-event-listener"
      ]
    }
  nitte-merchants-realm.json: |
    {
      "id": "nitte-merchants",
      "realm": "nitte-merchants",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": false,
      "bruteForceProtected": true,
      "loginTheme": "nitte",
      "roles": {
        "realm": [
          {
            "name": "merchant-admin",
            "description": "[RBAC] Merchant administrator - can manage all resources for their merchant"
          },
          {
            "name": "merchant-staff",
            "description": "[RBAC] Merchant staff - limited access to merchant resources"
          }
        ]
      },
      "clients": [
        {
          "clientId": "nitte-client",
          "enabled": true,
          "publicClient": false,
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": true,
          "redirectUris": [
            "http://merchant.192.168.56.200.nip.io/*",
            "http://localhost:5175/*"
          ],
          "webOrigins": [
            "http://merchant.192.168.56.200.nip.io"
          ],
          "protocolMappers": [
            {
              "name": "realm-roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "config": {
                "claim.name": "realm_access.roles",
                "jsonType.label": "String",
                "multivalued": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            },
            {
              "name": "client-roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-client-role-mapper",
              "config": {
                "claim.name": "resource_access.${client_id}.roles",
                "jsonType.label": "String",
                "multivalued": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true",
                "usermodel.clientRoleMapping.clientId": "nitte-client"
              }
            }
          ],
          "secret": "nitte-client-secret"
        }
      ],
      "users": [
        {
          "username": "merchant-admin@nitte.edu",
          "email": "merchant-admin@nitte.edu",
          "enabled": true,
          "emailVerified": true,
          "realmRoles": [
            "merchant-admin"
          ],
          "attributes": {
            "merchant_id": [
              "nitte-official-store"
            ]
          },
          "clientRoles": {
            "nitte-client": [
              "product:create",
              "product:update",
              "product:delete",
              "order:read-all"
            ]
          },
          "credentials": [
            {
              "type": "password",
              "value": "MerchantAdmin@123",
              "temporary": false
            }
          ]
        },
        {
          "username": "amazon-merchant@amazon.com",
          "email": "amazon-merchant@amazon.com",
          "enabled": true,
          "emailVerified": true,
          "realmRoles": [
            "merchant-admin"
          ],
          "attributes": {
            "merchant_id": [
              "amazon-store"
            ]
          },
          "clientRoles": {
            "nitte-client": [
              "product:create",
              "product:update",
              "product:delete",
              "order:read-all"
            ]
          },
          "credentials": [
            {
              "type": "password",
              "value": "Amazon@123",
              "temporary": false
            }
          ]
        },
        {
          "username": "flipkart-merchant@flipkart.com",
          "email": "flipkart-merchant@flipkart.com",
          "enabled": true,
          "emailVerified": true,
          "realmRoles": [
            "merchant-admin"
          ],
          "attributes": {
            "merchant_id": [
              "flipkart-store"
            ]
          },
          "clientRoles": {
            "nitte-client": [
              "product:create",
              "product:update",
              "product:delete",
              "order:read-all"
            ]
          },
          "credentials": [
            {
              "type": "password",
              "value": "Flipkart@123",
              "temporary": false
            }
          ]
        }
      ],
      "eventsListeners": [
        "jboss-logging",
        "nitte-notification-event-listener"
      ]
    }
