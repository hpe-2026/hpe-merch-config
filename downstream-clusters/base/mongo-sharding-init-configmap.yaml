# MongoDB sharding initialization script — run by mongo-init Job
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-sharding-init-config
  namespace: nitte
data:
  sharding-init.js: |
    // MongoDB Sharding Initialization Script
    // Run against mongos router after all shards are added
    // Sets up sharding on nitte_merch.orders by region
    
    // Switch to admin DB
    db = db.getSiblingDB('admin');
    
    // Add shards (wait for them to be available)
    print('Adding shards to cluster...');
    
    try {
      sh.addShard('shard1/mongo-shard1:27018');
      print('✓ Shard 1 (South/West India) added');
    } catch (e) {
      print('✓ Shard 1 already exists');
    }
    
    try {
      sh.addShard('shard2/mongo-shard2:27019');
      print('✓ Shard 2 (North/East India) added');
    } catch (e) {
      print('✓ Shard 2 already exists');
    }
    
    // Switch to nitte_merch database
    db = db.getSiblingDB('nitte_merch');
    
    // Create application users (optional in dev — no auth enforcement without keyFile).
    // In production (Kubernetes), auth is enforced via keyFile and these users are required.
    // For local dev, these are created for compatibility but mongos runs without auth.
    const writerPass = typeof APP_WRITER_PASS !== 'undefined' ? APP_WRITER_PASS : 'app_writer_dev';
    const readerPass = typeof APP_READER_PASS !== 'undefined' ? APP_READER_PASS : 'app_reader_dev';
    
    print('Creating application users...');
    try {
      db.createUser({
        user: 'app_writer',
        pwd: writerPass,
        roles: [{ role: 'readWrite', db: 'nitte_merch' }]
      });
    } catch (e) { print('app_writer may already exist'); }
    
    try {
      db.createUser({
        user: 'app_reader',
        pwd: readerPass,
        roles: [{ role: 'read', db: 'nitte_merch' }]
      });
    } catch (e) { print('app_reader may already exist'); }
    
    // Create collections
    db.createCollection('products');
    db.createCollection('orders');
    db.createCollection('users');
    
    // Enable sharding on the database
    db = db.getSiblingDB('admin');
    try { sh.enableSharding('nitte_merch'); } catch (e) { /* already enabled */ }
    print('✓ Sharding enabled on nitte_merch database');
    
    // Shard the orders collection by region
    db = db.getSiblingDB('nitte_merch');
    db.orders.createIndex({ region: 1 });
    db = db.getSiblingDB('admin');
    try { sh.shardCollection('nitte_merch.orders', { region: 1 }); } catch (e) { /* already sharded */ }
    print('✓ orders collection sharded by region');
    
    // Create zone mappings for region-based routing
    sh.addShardToZone('shard1', 'SOUTH_WEST');
    sh.addShardToZone('shard2', 'NORTH_EAST');
    
    // Define zone ranges
    sh.updateZoneKeyRange(
      'nitte_merch.orders',
      { region: 'south' },
      { region: 'south~' },
      'SOUTH_WEST'
    );
    sh.updateZoneKeyRange(
      'nitte_merch.orders',
      { region: 'west' },
      { region: 'west~' },
      'SOUTH_WEST'
    );
    sh.updateZoneKeyRange(
      'nitte_merch.orders',
      { region: 'north' },
      { region: 'north~' },
      'NORTH_EAST'
    );
    sh.updateZoneKeyRange(
      'nitte_merch.orders',
      { region: 'east' },
      { region: 'east~' },
      'NORTH_EAST'
    );
    
    print('✓ Zone ranges configured:');
    print('  - south, west → Shard 1 (SOUTH_WEST zone)');
    print('  - north, east → Shard 2 (NORTH_EAST zone)');
    
    // Create indexes for other collections
    db = db.getSiblingDB('nitte_merch');
    [
      () => db.products.createIndex({ name: 1 }),
      () => db.products.createIndex({ category: 1 }),
      () => db.products.createIndex({ merchant_id: 1 }),
      () => db.orders.createIndex({ user_id: 1 }),
      () => db.orders.createIndex({ merchant_id: 1 }),
      () => db.orders.createIndex({ order_id: 1 }),
      () => db.users.createIndex({ email: 1 }),
      () => db.users.createIndex({ status: 1 }),
    ].forEach(fn => { try { fn(); } catch (e) { print('index skip: ' + e.message); } });
    
    // Seed admin user (idempotent)
    if (db.users.countDocuments({ email: 'admin@nitte.edu' }) === 0) {
      db.users.insertOne({
        email: 'admin@nitte.edu',
        name: 'Admin User',
        alumni_id: 'ADMIN-001',
        department: 'Administration',
        role: 'admin',
        user_type: 'admin',
        status: 'approved',
        registration_timestamp: new Date(),
        approved_by: 'system',
        approval_timestamp: new Date(),
        events: [
          { type: 'registered', timestamp: new Date(), actor: 'system', reason: 'Initial seed' },
          { type: 'approved', timestamp: new Date(), actor: 'system', reason: 'Auto-approved' }
        ]
      });
      print('✓ Admin user seeded');
    } else {
      print('✓ Admin user already exists');
    }
    
    print('');
    print('========================================');
    print('MongoDB Sharding Setup Complete!');
    print('========================================');
    print('Database: nitte_merch');
    print('Sharded collection: orders (key: region)');
    print('Shard 1 (SOUTH_WEST): south, west regions');
    print('Shard 2 (NORTH_EAST): north, east regions');
    print('');
    print('Run sh.status() for full cluster info');
    print('========================================');

    // ── Seed Products ──────────────────────────────────────────────────
    db = db.getSiblingDB('nitte_merch');
    if (db.products.countDocuments({}) === 0) {
      print('Seeding product catalog...');
      var now = new Date();
      db.products.insertMany([
        { name: 'NITTE T-Shirt', description: 'Official NITTE University merchandise t-shirt. Premium cotton, comfortable fit.', category: 'clothing', price: 499, stock: 150, image_url: '/api/v1/upload/images/nitte-products/nitte-tshirt.png', merchant_id: 'nitte-official-store', created_by: 'system-seed', created_at: now, updated_at: now },
        { name: 'NITTE Hoodie', description: 'Warm and stylish NITTE hoodie. Fleece-lined with embroidered university crest.', category: 'clothing', price: 1299, stock: 80, image_url: '/api/v1/upload/images/nitte-products/nitte-hoodie.png', merchant_id: 'nitte-official-store', created_by: 'system-seed', created_at: now, updated_at: now },
        { name: 'NITTE Premium Hoodie', description: 'Premium quality NITTE hoodie with zip closure. Heavy-weight fabric.', category: 'clothing', price: 1799, stock: 50, image_url: '/api/v1/upload/images/nitte-products/nitte-premium_hoodie.png', merchant_id: 'nitte-official-store', created_by: 'system-seed', created_at: now, updated_at: now },
        { name: 'NITTE Cap', description: 'Adjustable baseball cap with NITTE embroidery. One size fits all.', category: 'accessories', price: 349, stock: 200, image_url: '/api/v1/upload/images/nitte-products/nitte-cap.png', merchant_id: 'nitte-official-store', created_by: 'system-seed', created_at: now, updated_at: now },
        { name: 'NITTE Coffee Mug', description: 'Ceramic coffee mug with NITTE logo. Microwave and dishwasher safe. 350ml.', category: 'accessories', price: 299, stock: 300, image_url: '/api/v1/upload/images/nitte-products/nitte-mug.png', merchant_id: 'nitte-official-store', created_by: 'system-seed', created_at: now, updated_at: now },
        { name: 'NITTE Water Bottle', description: 'Stainless steel insulated water bottle. Keeps drinks cold 24h, hot 12h. 750ml.', category: 'accessories', price: 599, stock: 120, image_url: '/api/v1/upload/images/nitte-products/nitte-waterbottle.png', merchant_id: 'nitte-official-store', created_by: 'system-seed', created_at: now, updated_at: now },
        { name: 'NITTE Notebook', description: 'A5 hardcover notebook with NITTE cover. 200 ruled pages, lay-flat binding.', category: 'stationery', price: 249, stock: 250, image_url: '/api/v1/upload/images/nitte-products/nitte-notebook.png', merchant_id: 'nitte-official-store', created_by: 'system-seed', created_at: now, updated_at: now },
        { name: 'NITTE Laptop Stickers', description: 'Pack of 5 premium vinyl stickers. Waterproof and UV-resistant.', category: 'stationery', price: 149, stock: 500, image_url: '/api/v1/upload/images/nitte-products/nitte-laptopStickers.png', merchant_id: 'nitte-official-store', created_by: 'system-seed', created_at: now, updated_at: now }
      ]);
      print('✓ Seeded 8 products');
    } else {
      print('✓ Products already seeded');
    }
