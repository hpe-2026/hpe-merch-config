# MongoDB backup CronJob - runs nightly, dumps the DB, uploads to admin MinIO nitte-backups bucket
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mongo-backup
  namespace: nitte
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          restartPolicy: OnFailure
          containers:
          - name: mongo-backup
            image: mongo:6.0
            imagePullPolicy: IfNotPresent
            command:
            - /bin/bash
            - -c
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              ARCHIVE="/tmp/nitte-backup-${TIMESTAMP}.gz"
              echo "Starting MongoDB backup at ${TIMESTAMP}..."
              mongodump --host mongodb:27017 --gzip --archive="${ARCHIVE}"
              echo "Dump complete: $(du -sh ${ARCHIVE})"
              # mc binary is copied from initContainer
              /usr/local/bin/mc alias set admin http://192.168.56.10:30900 app-user AppStorage99!
              /usr/local/bin/mc cp "${ARCHIVE}" "admin/nitte-backups/mongodb/${TIMESTAMP}.gz"
              echo "Backup uploaded to admin MinIO: nitte-backups/mongodb/${TIMESTAMP}.gz"
              echo "Backup job complete."
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
            volumeMounts:
            - name: mc-bin
              mountPath: /usr/local/bin/mc
              subPath: mc
          initContainers:
          - name: get-mc
            image: minio/mc:latest
            imagePullPolicy: IfNotPresent
            command: ["cp", "/usr/bin/mc", "/mc-bin/mc"]
            volumeMounts:
            - name: mc-bin
              mountPath: /mc-bin
          volumes:
          - name: mc-bin
            emptyDir: {}
