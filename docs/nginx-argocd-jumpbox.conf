# ArgoCD Webhook-Only Proxy — Jump Box NGINX
#
# SECURITY DESIGN:
#   - ArgoCD UI and API are NOT exposed publicly
#   - ONLY POST /api/webhook is proxied through
#   - All other paths return 403
#   - Only GitHub's IP ranges are allowed (allowlist below)
#   - ArgoCD validates the HMAC secret on every request (second layer)
#
# Deploy: /etc/nginx/sites-available/argocd-webhook
#         ln -s ../sites-available/argocd-webhook /etc/nginx/sites-enabled/

# GitHub's webhook IP ranges (update via: curl -s https://api.github.com/meta | jq .hooks)
# As of 2024 — periodically refresh these:
geo $github_ip {
    default         0;
    192.30.252.0/22  1;
    185.199.108.0/22 1;
    140.82.112.0/20  1;
    143.55.64.0/20   1;
    2a0a:a440::/29   1;  # IPv6
    2606:50c0::/32   1;  # IPv6
}

server {
    listen 443 ssl;
    server_name argocd.117.250.206.138.nip.io;

    # Reuse existing wildcard cert
    ssl_certificate     /etc/letsencrypt/live/frontend.117.250.206.138.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/frontend.117.250.206.138.nip.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Block everything by default ──────────────────────────────────────────
    location / {
        return 403 "Not exposed publicly.";
    }

    # ── Only the webhook endpoint is forwarded ───────────────────────────────
    location = /api/webhook {
        # Only allow GitHub IPs
        if ($github_ip = 0) {
            return 403 "IP not in GitHub webhook range.";
        }

        # Only accept POST (GitHub always POSTs webhooks)
        limit_except POST {
            deny all;
        }

        proxy_pass          http://192.168.56.10;
        proxy_http_version  1.1;
        proxy_set_header    Host              argocd.192.168.56.10.nip.io;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  10;  # webhooks should respond fast
    }
}

# Redirect HTTP → 403 (don't even redirect to HTTPS for non-webhook traffic)
server {
    listen 80;
    server_name argocd.117.250.206.138.nip.io;
    return 403 "Not exposed publicly.";
}
