apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-casc-config
  namespace: system
data:
  jenkins.yaml: |
    jenkins:
      # Zero executors on the controller — all builds run in ephemeral K8s pods.
      numExecutors: 0
      systemMessage: "NITTE Merch — Jenkins CI/CD | K8s Pod Agents"

      # ── Security — LOCAL user database ────────────────────────────────────
      # Using local security realm so Jenkins starts reliably without requiring
      # Keycloak to be running. Keycloak SSO can be re-enabled once the pipeline
      # is stable (see docs/CICD_PIPELINE.md for the OIC CasC snippet).
      # ── Security — Keycloak SSO via OpenID Connect ────────────────────────
      securityRealm:
        oic:
          clientId: "jenkins-client"
          clientSecret: "jenkins-client-secret"
          serverConfiguration:
            wellKnown:
              wellKnownOpenIDConfigurationUrl: "http://keycloak.identity-core.svc.cluster.local:8080/realms/nitte-realm/.well-known/openid-configuration"
              scopesOverride: "openid email"
          tokenAuthMethod: "client_secret_post"
          userNameField: "sub"
          disableSslVerification: true
          logoutFromOpenidProvider: false
      authorizationStrategy:
        loggedInUsersCanDoAnything:
          allowAnonymousRead: false

      # ── Kubernetes Cloud — ephemeral pod agents ───────────────────────────
      # The devops-agent pod template is used by Jenkinsfile:
      #   agent { kubernetes { inheritFrom 'devops-agent' } }
      clouds:
        - kubernetes:
            name: "kubernetes"
            serverUrl: "https://kubernetes.default.svc"
            namespace: "system"
            jenkinsUrl: "http://jenkins.system.svc.cluster.local:8080"
            jenkinsTunnel: "jenkins.system.svc.cluster.local:50000"
            connectTimeout: 10
            readTimeout: 20
            templates:
              - name: "devops-agent"
                namespace: "system"
                label: "devops-agent"
                serviceAccount: "jenkins"
                nodeUsageMode: EXCLUSIVE
                idleMinutes: 0
                containers:
                  # devops container: node:20-alpine + tools installed by Setup Tools stage
                  - name: "devops"
                    image: "node:20-alpine"
                    command: "sleep"
                    args: "99d"
                    workingDir: "/home/jenkins/agent"
                    ttyEnabled: true
                    resourceRequestCpu: "500m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                  # kaniko container: builds and pushes Docker images to Nexus
                  # Uses :debug tag which ships /busybox/sh so "sleep 99d" works
                  - name: "kaniko"
                    image: "gcr.io/kaniko-project/executor:debug"
                    command: "sleep"
                    args: "99d"
                    ttyEnabled: true
                    resourceRequestCpu: "1"
                    resourceRequestMemory: "1Gi"
                    resourceLimitCpu: "2"
                    resourceLimitMemory: "2Gi"
                    # security container: runs Trivy vulnerability scans and SBOM generation
                  - name: "security"
                    image: "aquasec/trivy:latest"
                    command: "sleep"
                    args: "99d"
                    ttyEnabled: true
                volumes:
                  # Docker auth secret mounted at /kaniko/.docker/config.json
                  # Create out-of-band: kubectl create secret generic nexus-docker-config
                  #   --from-file=config.json=/tmp/nexus-docker-config.json -n system
                  - secretVolume:
                      secretName: "nexus-docker-config"
                      mountPath: "/kaniko/.docker"

    # ── Credentials ──────────────────────────────────────────────────────────
    credentials:
      system:
        domainCredentials:
          - credentials:
              - usernamePassword:
                  id: "nexus-creds"
                  username: "admin"
                  password: "nexus-admin-123"
                  description: "Nexus admin credentials"
                  scope: GLOBAL
              - usernamePassword:
                  id: "github-pat"
                  username: "hpe-2026-bot"
                  password: "ghp_REPLACE_WITH_REAL_PAT"
                  description: "GitHub PAT for hpe-merch-config push"
                  scope: GLOBAL

    # ── Unclassified ──────────────────────────────────────────────────────────
    unclassified:
      location:
        url: "http://jenkins.192.168.56.10.nip.io/"