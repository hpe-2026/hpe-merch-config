# Ingress resources for Jenkins and Nexus (system namespace)
# Both services are on the ADMIN cluster (192.168.56.10) — all hostnames must
# use 192.168.56.10.nip.io, not 192.168.56.12.nip.io.
---
# ── Jenkins Ingress ───────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jenkins
  namespace: system
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "256k"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
  - host: jenkins.192.168.56.10.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jenkins   # Direct access (local Jenkins auth)
            port:
              number: 8080

---
# ── Nexus Web UI Ingress ──────────────────────────────────────────────────────
# Routes to oauth2-proxy (port 4180) to enforce Keycloak authentication.
# The oauth2-proxy → Nexus sidecar pattern (RUT proxy) means the user's
# identity is forwarded via the X-Forwarded-User header.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus
  namespace: system
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "256k"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
  - host: nexus.192.168.56.10.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: oauth2-proxy-nexus   # SSO via Keycloak cicd-realm
            port:
              number: 4183
