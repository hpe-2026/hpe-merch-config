# ── ServiceAccount — Jenkins controller runs as this SA ──────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: system

---
# ── Role — permissions Jenkins needs in its own namespace ────────────────────
# Required by the Kubernetes plugin to create/delete ephemeral build-agent pods.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-agent-role
  namespace: system
rules:
  # Pod lifecycle — create agent pods, watch their status, delete on completion.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pod logs — stream build output back to the controller.
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list", "watch"]
  # Pod exec — used by the Kubernetes plugin for interactive agent communication.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
  # Secrets — read nexus-docker-config + other secrets mounted in agent pods.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # ConfigMaps — read CasC + any agent-mounted config maps.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
# ── RoleBinding — bind the Role to the jenkins ServiceAccount ─────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-agent-rolebinding
  namespace: system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: jenkins-agent-role
subjects:
  - kind: ServiceAccount
    name: jenkins
    namespace: system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: system
  labels:
    app: jenkins

spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: jenkins

  template:
    metadata:
      labels:
        app: jenkins

    spec:
      serviceAccountName: jenkins

      initContainers:
      - name: wait-for-keycloak
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command:
          - sh
          - -c
          - |
            until nc -z keycloak.identity-core.svc.cluster.local 8080; do
              echo "waiting for keycloak"
              sleep 5
            done

      containers:
      - name: jenkins
        image: jenkins/jenkins:lts-jdk17
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080
        - containerPort: 50000

        env:
        - name: TZ
          value: "Asia/Kolkata"

        - name: JAVA_OPTS
          value: "-Duser.timezone=Asia/Kolkata -Djenkins.install.runSetupWizard=false -Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true"

        - name: CASC_JENKINS_CONFIG
          value: "/var/jenkins_home/casc/jenkins.yaml"

        volumeMounts:
        - name: jenkins-data
          mountPath: /var/jenkins_home

        - name: jenkins-casc
          mountPath: /var/jenkins_home/casc/jenkins.yaml
          subPath: jenkins.yaml
          readOnly: true

        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "4"
            memory: "4Gi"

        livenessProbe:
          httpGet:
            path: /login
            port: 8080
          initialDelaySeconds: 120
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 10

        readinessProbe:
          httpGet:
            path: /login
            port: 8080
          initialDelaySeconds: 90
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 15

      volumes:
      - name: jenkins-data
        persistentVolumeClaim:
          claimName: jenkins-pvc

      - name: jenkins-casc
        configMap:
          name: jenkins-casc-config
          items:
          - key: jenkins.yaml
            path: jenkins.yaml

---
apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: system

spec:
  selector:
    app: jenkins

  ports:
  - name: web
    port: 8080
    targetPort: 8080

  - name: agent
    port: 50000
    targetPort: 50000

  type: ClusterIP
