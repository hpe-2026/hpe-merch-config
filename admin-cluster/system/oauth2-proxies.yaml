apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-prometheus
  namespace: system
  labels:
    app: oauth2-proxy-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-prometheus
  template:
    metadata:
      labels:
        app: oauth2-proxy-prometheus
    spec:
      initContainers:
      - name: wait-for-keycloak
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z keycloak.identity-core.svc.cluster.local 8080; do echo "waiting for keycloak"; sleep 5; done']
      - name: wait-for-prometheus
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z prometheus.observability.svc.cluster.local 9090; do echo "waiting for prometheus"; sleep 2; done']
      containers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
        imagePullPolicy: IfNotPresent
        args:
        - --provider=oidc
        - --client-id=observability-proxy
        - --client-secret=observability-proxy-secret
        - --oidc-issuer-url=http://keycloak.192.168.56.10.nip.io/realms/cicd-realm
        - --login-url=http://keycloak.192.168.56.10.nip.io/realms/cicd-realm/protocol/openid-connect/auth
        - --redeem-url=http://keycloak.identity-core.svc.cluster.local:8080/realms/cicd-realm/protocol/openid-connect/token
        - --validate-url=http://keycloak.identity-core.svc.cluster.local:8080/realms/cicd-realm/protocol/openid-connect/userinfo
        - --redirect-url=http://prometheus.192.168.56.10.nip.io/oauth2/callback
        - --upstream=http://prometheus.observability.svc.cluster.local:9090
        - --http-address=0.0.0.0:4180
        - --cookie-secret=T2JzZXJ2YWJpbGl0eVByb3h5U2VjcmV0
        - --cookie-secure=false
        - --cookie-name=_oauth2_prometheus
        - --email-domain=*
        - --insecure-oidc-skip-issuer-verification=true
        - --ssl-insecure-skip-verify=true
        - --skip-provider-button=true
        ports:
        - containerPort: 4180
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-prometheus
  namespace: system
spec:
  selector:
    app: oauth2-proxy-prometheus
  ports:
  - port: 4180
    targetPort: 4180
  type: ClusterIP
---
