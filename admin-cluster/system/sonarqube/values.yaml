# SonarQube Official Helm Chart Values (Production-Ready)
# -----------------------------------------------------

# 1. External PostgreSQL (Production Requirement)
# The default embedded H2 database is strictly for evaluation. It cannot be upgraded
# and will lose data. We enable the bundled Bitnami PostgreSQL subchart to automatically
# provision a robust, persistent Postgres instance within this namespace.
postgresql:
  enabled: true
  auth:
    # GitOps Note: In a true prod environment, this should be injected via ExternalSecrets.
    # We define it here declaratively so Kustomize can template it cleanly.
    postgresPassword: "sonarqube-db-password"
  primary:
    persistence:
      enabled: true
      size: 20Gi
      # storageClass: "standard" # Uncomment and modify if you use a specific CSI driver

# 2. SonarQube Data Persistence
# Critical for preserving plugins, extensions, and Elasticsearch index data across pod restarts.
persistence:
  enabled: true
  size: 20Gi
  # storageClass: "standard" # Uncomment and modify if you use a specific CSI driver

# 3. Resources (Requests and Limits)
# SonarQube uses ElasticSearch, requiring a JVM and substantial memory.
resources:
  requests:
    memory: "2Gi"
    cpu: "1000m"
  limits:
    memory: "4Gi"
    cpu: "2000m"

# 4. Probes (Tuned for JVM / ElasticSearch startup times)
readinessProbe:
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 6
livenessProbe:
  initialDelaySeconds: 120
  periodSeconds: 30
  failureThreshold: 6
startupProbe:
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 24

# 5. Ingress & Service 
# We use ClusterIP internally. 
# SonarQube does not strictly need an ingress if Jenkins communicates via ClusterIP 
# and admins access it via port-forwarding or internal VPN.
# If external web UI access is required, change enabled: true and configure hosts.
service:
  type: ClusterIP
  port: 9000

ingress:
  enabled: false
  # hosts:
  #   - name: sonarqube.local
  #     path: /

# 6. ElasticSearch Configuration
sonarProperties:
  # If your cluster does not allow privileged initContainers to set sysctl vm.max_map_count,
  # uncomment the following line to prevent ElasticSearch from failing:
  # sonar.search.javaAdditionalOpts: "-Dnode.store.allow_mmap=false"
