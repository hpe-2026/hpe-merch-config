apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Ensure everything is deployed into the sonarqube namespace
namespace: sonarqube

resources:
  - namespace.yaml

# GitOps Best Practice: Use helmCharts directly in Kustomize rather than generating massive YAMLs.
# ArgoCD's Kustomize controller natively understands this block and fetches/templates the chart dynamically.
helmCharts:
  - name: sonarqube
    repo: https://SonarSource.github.io/helm-chart-sonarqube
    version: "10.6.1" # Locks the chart version for declarative stability
    releaseName: sonarqube
    namespace: sonarqube
    valuesFile: values.yaml
