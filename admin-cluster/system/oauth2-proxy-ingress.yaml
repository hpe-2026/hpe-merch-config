# Prometheus and Jaeger — protected by oauth2-proxy (Keycloak SSO login required)
# These ingresses live in the 'system' namespace (same as the oauth2-proxy pods/services).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-sso
  namespace: system
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "256k"
spec:
  ingressClassName: nginx
  rules:
  - host: prometheus.192.168.56.10.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: oauth2-proxy-prometheus
            port:
              number: 4180
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger-sso
  namespace: system
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "256k"
spec:
  ingressClassName: nginx
  rules:
  - host: jaeger.192.168.56.10.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: oauth2-proxy-jaeger
            port:
              number: 4181
