apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube
  namespace: system
  labels:
    app: sonarqube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube
  template:
    metadata:
      labels:
        app: sonarqube
    spec:
      initContainers:
      - name: sysctl
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
        command:
        - sh
        - -c
        - |
          sysctl -w vm.max_map_count=524288

      - name: wait-for-keycloak
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          until nc -z keycloak.identity-core.svc.cluster.local 8080; do
            echo "waiting for keycloak..."
            sleep 5
          done

      containers:
      - name: sonarqube
        image: sonarqube:10-community
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 9000

        env:
        - name: SONAR_ES_BOOTSTRAP_CHECKS_DISABLE
          value: "true"

        volumeMounts:
        - name: sonarqube-data
          mountPath: /opt/sonarqube/data

        resources:
          requests:
            memory: "1Gi"
            cpu: "300m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        readinessProbe:
          httpGet:
            path: /api/system/status
            port: 9000
          initialDelaySeconds: 90
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 10

        livenessProbe:
          httpGet:
            path: /api/system/status
            port: 9000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5

      volumes:
      - name: sonarqube-data
        persistentVolumeClaim:
          claimName: sonarqube-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube
  namespace: system
spec:
  selector:
    app: sonarqube
  ports:
  - port: 9000
    targetPort: 9000
  type: ClusterIP