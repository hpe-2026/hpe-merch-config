apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus
  namespace: system
  labels:
    app: nexus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nexus
  template:
    metadata:
      labels:
        app: nexus
    spec:
      initContainers:
      - name: wait-for-keycloak
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z keycloak.identity-core.svc.cluster.local 8080; do echo "waiting for keycloak"; sleep 5; done']
      containers:
      - name: nexus
        image: sonatype/nexus3:3.72.0
        imagePullPolicy: IfNotPresent
        ports:
        # REST API / Web UI
        - name: http
          containerPort: 8081
        # Docker hosted registry (configured inside Nexus UI: Administration →
        # Repositories → Create repository → docker (hosted) → HTTP port: 8082).
        # IMPORTANT: You MUST create this repo in the Nexus UI before running
        # the Jenkins pipeline. See docs/CICD_PIPELINE.md for steps.
        - name: docker-hosted
          containerPort: 8082
        - name: docker-group
          containerPort: 8083
        env:
        - name: INSTALL4J_ADD_VM_PARAMS
          value: "-Xms512m -Xmx1g -XX:MaxDirectMemorySize=512m"
        - name: NEXUS_SECURITY_INITIAL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: admin-secrets
              key: NEXUS_INITIAL_PASSWORD
        - name: KEYCLOAK_SERVER_URL
          value: "http://keycloak.identity-core.svc.cluster.local:8080"
        - name: KEYCLOAK_REALM
          value: nitte-realm
        - name: KEYCLOAK_CLIENT_ID
          value: nexus-client
        volumeMounts:
        - name: nexus-data
          mountPath: /nexus-data
        resources:
          requests:
            memory: "384Mi"
            cpu: "200m"
          limits:
            memory: "1536Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /service/rest/v1/status
            port: 8081
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /service/rest/v1/status
            port: 8081
          initialDelaySeconds: 90
          periodSeconds: 15
          failureThreshold: 10
      volumes:
      - name: nexus-data
        persistentVolumeClaim:
          claimName: nexus-pvc

---
# ── ClusterIP service — internal REST API access (port 8081) ──────────────────
apiVersion: v1
kind: Service
metadata:
  name: nexus
  namespace: system
spec:
  selector:
    app: nexus
  ports:
  - name: http
    port: 8081
    targetPort: 8081
  type: ClusterIP

---
# ── NodePort service — Docker registry exposed to ALL clusters ────────────────
# The NodePort (30082) is reachable at 192.168.56.10:30082 from:
#   - Kaniko running inside the admin cluster (pushes images)
#   - Dev cluster nodes (192.168.56.11) pulling images for deployment
#   - Prod cluster nodes (192.168.56.12) pulling images for deployment
#
# The image address 192.168.56.10:30082 must match exactly in:
#   - Jenkinsfile: NEXUS_REGISTRY
#   - downstream-clusters/base/kustomization.yaml: newName fields
#   - nexus-docker-config.json: auths key
#   - RKE2 registries.yaml on ALL nodes: insecure registry config
apiVersion: v1
kind: Service
metadata:
  name: nexus-docker
  namespace: system
spec:
  selector:
    app: nexus
  ports:
  - name: docker-hosted
    port: 8082
    targetPort: 8082
    nodePort: 30082
  - name: docker-group
    port: 8083
    targetPort: 8083
    nodePort: 30083
  type: NodePort
