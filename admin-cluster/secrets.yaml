# Admin Cluster Secrets
# IMPORTANT: Replace placeholder values before applying.
# For production use, manage with Sealed Secrets, External Secrets Operator,
# or Vault Agent — never commit real credentials to Git.
#
# Apply per namespace:
#   kubectl apply -f admin-cluster/secrets.yaml

---
apiVersion: v1
kind: Secret
metadata:
  name: admin-secrets
  namespace: identity-core
type: Opaque
stringData:
  KEYCLOAK_ADMIN: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "changeme-keycloak-admin"
  POSTGRES_KEYCLOAK_PASSWORD: "changeme-pg-keycloak"

---
apiVersion: v1
kind: Secret
metadata:
  name: admin-secrets
  namespace: storage-system
type: Opaque
stringData:
  MINIO_ROOT_PASSWORD: "changeme-minio-root"

---
apiVersion: v1
kind: Secret
metadata:
  name: admin-secrets
  namespace: system
type: Opaque
stringData:
  NEXUS_INITIAL_PASSWORD: "changeme-nexus"

---
apiVersion: v1
kind: Secret
metadata:
  name: admin-secrets
  namespace: observability
type: Opaque
stringData:
  PROMTAIL_API_KEY: "promtail-loki-secret"
  GF_SECURITY_ADMIN_PASSWORD: "changeme-grafana"
