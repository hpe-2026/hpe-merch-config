# admin-cluster/kustomization.yaml
# ArgoCD points to this path (admin-cluster/) and Kustomize assembles everything.
# Secrets are excluded here — they are applied out-of-band before ArgoCD bootstrap.
# ArgoCD Application: admin-cluster-apps -> path: admin-cluster/

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # --- Foundation ---
  - namespaces.yaml
  - pvcs.yaml

  # --- Networking (MetalLB config — operator installed out-of-band) ---
  - network-system/metallb-config.yaml

  # --- Storage ---
  - storage-system/minio.yaml
  - storage-system/minio-init.yaml
  - storage-system/minio-ingress.yaml

  # --- Identity ---
  - identity-core/keycloak-realm-config.yaml
  - identity-core/keycloak-bootstrap-config.yaml
  - identity-core/promtail-keycloak-config.yaml
  - identity-core/keycloak-spi-config.yaml
  - identity-core/postgres-keycloak.yaml
  - identity-core/keycloak.yaml
  - identity-core/keycloak-setup.yaml
  - identity-core/keycloak-ingress.yaml

  # --- Observability ---
  - observability/prometheus-main-config.yaml
  - observability/prometheus-rules-config.yaml
  - observability/alertmanager-config.yaml
  - observability/loki-config-map.yaml
  - observability/grafana-datasources-config.yaml
  - observability/grafana-dashboards-config.yaml
  - observability/grafana-waf-dashboard-config.yaml
  - observability/prometheus.yaml
  - observability/thanos.yaml
  - observability/loki.yaml
  - observability/loki-rbac-proxy.yaml
  - observability/grafana.yaml
  - observability/alertmanager.yaml
  - observability/jaeger.yaml
  - observability/goalert.yaml
  - observability/observability-ingress.yaml
  - observability/promtail-waf.yaml

  # --- GitOps Engine ---
  - gitops-system/argocd.yaml
  - gitops-system/argocd-rbac-patch.yaml
  - gitops-system/argocd-oidc.yaml
  - gitops-system/argocd-waf-app.yaml

  # --- System Tools ---
  - system/jenkins-casc-config.yaml
  - system/jenkins.yaml
  - system/nexus.yaml
  - system/oauth2-proxies.yaml
  - system/jenkins-nexus-ingress.yaml
  - system/oauth2-proxy-ingress.yaml
