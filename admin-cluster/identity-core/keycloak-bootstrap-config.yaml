apiVersion: v1
data:
  keycloak-bootstrap.sh: |
    #!/bin/sh
    # Post-start bootstrap: apply master-realm settings that cannot be set via realm JSON.
    # Runs as a separate keycloak-setup container after Keycloak is healthy.
    # Safe to run repeatedly (idempotent).

    KC_URL="http://keycloak:8080"
    KCADM="/opt/keycloak/bin/kcadm.sh"

    echo "[bootstrap] Waiting for Keycloak token endpoint to accept credentials..."
    i=0
    while [ $i -lt 60 ]; do
      echo "[bootstrap] Attempting to get token for user $KEYCLOAK_USER..."
      # Capture the full response for debugging
      HTTP_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "${KC_URL}/realms/master/protocol/openid-connect/token" \
        -d "client_id=admin-cli&grant_type=password&username=${KEYCLOAK_USER}&password=${KEYCLOAK_PASSWORD}" || echo "CURL_FAILED")
      
      echo "[bootstrap] Keycloak response: $HTTP_RESPONSE"
      
      if echo "$HTTP_RESPONSE" | grep -q '"access_token"'; then
        echo "[bootstrap] Token endpoint ready."
        break
      fi
      
      i=$((i+1))
      sleep 3
    done

    echo "[bootstrap] Authenticating via kcadm..."
    $KCADM config credentials \
      --server "$KC_URL" --realm master \
      --user "$KEYCLOAK_USER" --password "$KEYCLOAK_PASSWORD"

    echo "[bootstrap] Setting master realm login theme to nitte..."
    $KCADM update realms/master -s loginTheme=nitte

    echo "[bootstrap] Setting CONFIGURE_TOTP required action on admin user..."
    ADMIN_ID=$($KCADM get users -r master -q username="$KEYCLOAK_USER" --fields id \
      | grep '"id"' | head -1 | awk -F'"' '{print $4}')

    if [ -n "$ADMIN_ID" ]; then
      $KCADM update users/"$ADMIN_ID" -r master \
        -s 'requiredActions=["CONFIGURE_TOTP"]'
      echo "[bootstrap] TOTP required action set on admin (id: $ADMIN_ID)."
    else
      echo "[bootstrap] WARNING: admin user not found in master realm."
    fi

    echo "[bootstrap] Done."
kind: ConfigMap
metadata:
  name: keycloak-bootstrap-config
  namespace: identity-core
