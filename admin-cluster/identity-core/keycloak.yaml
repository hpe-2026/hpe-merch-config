apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: identity-core
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
        promtail.io/scrape: "true"
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z postgres-keycloak 5432; do echo "waiting for postgres"; sleep 3; done']
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:20.0.0
        imagePullPolicy: IfNotPresent
        args: ["start-dev", "--import-realm"]
        ports:
        - containerPort: 8080
        env:
        - name: KEYCLOAK_ADMIN
          valueFrom:
            secretKeyRef:
              name: admin-secrets
              key: KEYCLOAK_ADMIN
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: admin-secrets
              key: KEYCLOAK_ADMIN_PASSWORD
        - name: KC_DB
          value: postgres
        - name: KC_DB_URL
          value: jdbc:postgresql://postgres-keycloak:5432/keycloak
        - name: KC_DB_USERNAME
          value: keycloak
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: admin-secrets
              key: POSTGRES_KEYCLOAK_PASSWORD
        - name: KC_FEATURES
          value: import-realm
        - name: KEYCLOAK_JWKS_URL
          value: http://keycloak.identity-core.svc.cluster.local:8080/realms/nitte-realm/protocol/openid-connect/certs
        - name: KC_HOSTNAME_URL
          value: https://keycloak.192.168.56.10.nip.io
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_HOSTNAME_STRICT_HTTPS
          value: "false"
        - name: KC_PROXY
          value: edge
        - name: NOTIFICATION_SERVICE_URL
          value: http://notification-service.nitte.svc.cluster.local:9100/api/v1/events
        - name: NOTIFICATION_TIMEOUT_SECONDS
          value: "5"
        - name: QUARKUS_LOG_FILE_ENABLE
          value: "true"
        - name: QUARKUS_LOG_FILE_PATH
          value: /opt/keycloak/log/keycloak.log
        - name: QUARKUS_LOG_FILE_FORMAT
          value: '%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %s%e%n'
        volumeMounts:
        - name: keycloak-realm
          mountPath: /opt/keycloak/data/import/nitte-realm.json
          subPath: nitte-realm.json
          readOnly: true
        - name: keycloak-logs
          mountPath: /opt/keycloak/log
        - name: keycloak-spi
          mountPath: /opt/keycloak/providers/keycloak-event-listener-1.0.0.jar
          subPath: keycloak-event-listener-1.0.0.jar
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1500m"
        startupProbe:
          httpGet:
            path: /realms/master
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /realms/master
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /realms/master
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
      - name: promtail-sidecar
        image: grafana/promtail:2.9.4
        imagePullPolicy: IfNotPresent
        args:
          - -config.file=/etc/promtail/config.yml
        volumeMounts:
        - name: keycloak-logs
          mountPath: /var/log/keycloak
          readOnly: true
        - name: promtail-keycloak-config
          mountPath: /etc/promtail/config.yml
          subPath: promtail-keycloak-config.yml
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: keycloak-realm
        configMap:
          name: keycloak-realm-config
          items:
          - key: nitte-realm.json
            path: nitte-realm.json
      - name: keycloak-logs
        emptyDir: {}
      - name: keycloak-spi
        configMap:
          name: keycloak-spi-config
          items:
          - key: keycloak-event-listener-1.0.0.jar
            path: keycloak-event-listener-1.0.0.jar
      - name: promtail-keycloak-config
        configMap:
          name: promtail-keycloak-config
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: identity-core
spec:
  selector:
    app: keycloak
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
