# Admin Cluster Namespace Declarations
# Apply first before any other admin-cluster manifests:
#   kubectl apply -f admin-cluster/namespaces.yaml

---
apiVersion: v1
kind: Namespace
metadata:
  name: identity-core
  labels:
    app.kubernetes.io/managed-by: kubectl
    cluster-role: admin

---
apiVersion: v1
kind: Namespace
metadata:
  name: storage-system
  labels:
    app.kubernetes.io/managed-by: kubectl
    cluster-role: admin

---
apiVersion: v1
kind: Namespace
metadata:
  name: system
  labels:
    app.kubernetes.io/managed-by: kubectl
    cluster-role: admin

---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    app.kubernetes.io/managed-by: kubectl
    cluster-role: admin

---
apiVersion: v1
kind: Namespace
metadata:
  name: gitops-system
  labels:
    app.kubernetes.io/managed-by: kubectl
    cluster-role: admin

---
apiVersion: v1
kind: Namespace
metadata:
  name: cattle-system
  labels:
    app.kubernetes.io/managed-by: kubectl
    cluster-role: admin

---
apiVersion: v1
kind: Namespace
metadata:
  name: goalert
  labels:
    app.kubernetes.io/managed-by: kubectl
    cluster-role: admin

---
apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
  labels:
    app.kubernetes.io/managed-by: kubectl
    cluster-role: admin
    # MetalLB speaker needs privileged pod security
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
