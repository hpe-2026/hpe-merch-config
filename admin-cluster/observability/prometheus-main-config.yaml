apiVersion: v1
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s
      external_labels:
        cluster: nitte-shop
        environment: docker

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      - job_name: node-backend
        metrics_path: /metrics
        static_configs:
          - targets: ['node-backend:3000']
            labels:
              service: node-backend

      - job_name: python-service
        metrics_path: /metrics
        static_configs:
          - targets: ['python-service:8000']
            labels:
              service: python-service

      - job_name: notification-service
        metrics_path: /metrics
        static_configs:
          - targets: ['notification-service:9100']
            labels:
              service: notification-service

      # Federation scrape from Thanos Query so Admin Prometheus can evaluate
      # WAF alert rules. waf_attacks_total is written by promtail (dev cluster)
      # via prometheus-agent remote_write -> Thanos Receiver -> Thanos Query.
      - job_name: thanos-federation
        honor_labels: true
        metrics_path: /federate
        params:
          match[]:
            - '{__name__=~"waf_attacks_total.*"}'
            - '{__name__=~"istio_requests_total.*"}'
        static_configs:
          - targets: ['thanos-query.observability.svc.cluster.local:9090']
kind: ConfigMap
metadata:
  name: prometheus-main-config
  namespace: observability
