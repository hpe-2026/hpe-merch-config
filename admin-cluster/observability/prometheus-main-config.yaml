apiVersion: v1
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s
      external_labels:
        cluster: nitte-shop
        environment: docker

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      - job_name: node-backend
        metrics_path: /metrics
        static_configs:
          - targets: ['node-backend:3000']
            labels:
              service: node-backend

      - job_name: python-service
        metrics_path: /metrics
        static_configs:
          - targets: ['python-service:8000']
            labels:
              service: python-service

      - job_name: notification-service
        metrics_path: /metrics
        static_configs:
          - targets: ['notification-service:9100']
            labels:
              service: notification-service

    # remote_read from Thanos Query so Admin Prometheus alert rules can
    # evaluate cross-cluster metrics (waf_attacks_total, istio_requests_total).
    # waf_attacks_total flows: promtail (dev) -> prometheus-agent remote_write
    #   -> Thanos Receiver -> Thanos Query -> here via remote_read.
    # Thanos Query does NOT implement /federate (gives 404), but DOES implement
    # the Prometheus remote_read API at /api/v1/read.
    remote_read:
      - url: http://thanos-query.observability.svc.cluster.local:9090/api/v1/read
        read_recent: true
        name: thanos
kind: ConfigMap
metadata:
  name: prometheus-main-config
  namespace: observability
