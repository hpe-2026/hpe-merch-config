apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observability

data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
      receiver: default
      routes:
        - match:
            severity: critical
          receiver: default
          group_wait: 10s
          repeat_interval: 1h

        - match:
            severity: warning
          receiver: default
          repeat_interval: 3h

    receivers:
      - name: default
        slack_configs:
          - api_url: "<SLACK_WEBHOOK_URL>"
            channel: "#all-code-grey-03"
            send_resolved: true

            username: "Alertmanager"

            title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"

            text: |
              *Severity:* {{ .CommonLabels.severity }}

              *Summary:* {{ .CommonAnnotations.summary }}

              *Description:* {{ .CommonAnnotations.description }}

              *Starts At:* {{ .StartsAt }}

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal:
          - alertname