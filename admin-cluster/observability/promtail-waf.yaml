---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-waf-config
  namespace: observability
data:
  config.yml: |
    server:
      http_listen_port: 9082
      grpc_listen_port: 0
      log_level: info

    positions:
      filename: /tmp/positions-waf.yaml

    clients:
      - url: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push
        tenant_id: default
        headers:
          X-Promtail-Api-Key: promtail-loki-secret

    scrape_configs:
      - job_name: waf-logs
        static_configs:
          - targets:
              - localhost
            labels:
              job: coraza-waf
              cluster: admin
              __path__: /var/log/pods/istio-system_istio-ingressgateway-*/*/*.log
        pipeline_stages:
          - cri: {}
          - match:
              selector: '{job="coraza-waf"}'
              stages:
                - regex:
                    # Actual Coraza WASM log format (Envoy/Istio OWASP CRS 4.x):
                    # 2026-...Z  critical  envoy wasm ...  wasm log istio-system.coraza-waf:
                    # [client "IP"] Coraza: Warning. ... [id "942100"] ... [severity "critical"] ... [uri "/path"]
                    expression: 'wasm log istio-system\.coraza-waf:.*\[id "(?P<rule_id>\d+)"\].*\[severity "(?P<waf_level>[^"]+)"\].*\[uri "(?P<uri>[^"]+)"\]'
                - regex:
                    # Extract attack type from tag if present (e.g. [tag "attack-sqli"] -> attack_type=sqli)
                    expression: '\[tag "attack-(?P<attack_type>[^"]+)"\]'
                - labels:
                    waf_level:
                    rule_id:
                    attack_type:
                    uri:
                - metrics:
                    waf_attacks_total:
                      type: Counter
                      description: "Total WAF attack detections by rule and type"
                      source: rule_id
                      config:
                        action: inc
          - labeldrop:
              - filename
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail-waf
  namespace: observability
  labels:
    app: promtail-waf
spec:
  selector:
    matchLabels:
      app: promtail-waf
  template:
    metadata:
      labels:
        app: promtail-waf
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: promtail-waf
      tolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: promtail-waf
          image: grafana/promtail:2.9.4
          imagePullPolicy: IfNotPresent
          args: ["-config.file=/etc/promtail/config.yml"]
          ports:
            - containerPort: 9082
              name: http-metrics
          volumeMounts:
            - name: promtail-waf-config
              mountPath: /etc/promtail/config.yml
              subPath: config.yml
              readOnly: true
            - name: pods-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: containers-logs
              mountPath: /var/log/containers
              readOnly: true
            - name: docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: promtail-waf-config
          configMap:
            name: promtail-waf-config
            items:
              - key: config.yml
                path: config.yml
        - name: pods-logs
          hostPath:
            path: /var/log/pods
        - name: containers-logs
          hostPath:
            path: /var/log/containers
        - name: docker-containers
          hostPath:
            path: /var/lib/docker/containers
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail-waf
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-waf
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-waf
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail-waf
subjects:
  - kind: ServiceAccount
    name: promtail-waf
    namespace: observability
---
# Headless Service so Admin Prometheus can scrape waf_attacks_total from this pod
apiVersion: v1
kind: Service
metadata:
  name: promtail-waf
  namespace: observability
  labels:
    app: promtail-waf
spec:
  clusterIP: None
  selector:
    app: promtail-waf
  ports:
    - name: http-metrics
      port: 9082
      targetPort: 9082
