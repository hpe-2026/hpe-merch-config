apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: gitops-system
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  url: http://argocd.192.168.56.10.nip.io
  oidc.config: |
    name: Keycloak
    issuer: http://keycloak.192.168.56.10.nip.io/realms/cicd-realm
    clientID: argocd-client
    clientSecret: argocd-client-secret
    requestedScopes: ["openid", "profile", "email", "roles"]
    requestedIDTokenClaims:
      email:
        essential: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: gitops-system
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  policy.default: role:readonly
  scopes: '[email, roles]'
  policy.csv: |
    p, role:readonly, applications, get, *, allow
    p, role:readonly, projects, get, *, allow
    p, role:readonly, logs, get, *, allow
    p, role:admin, applications, *, */*, allow
    p, role:admin, clusters, *, *, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, projects, *, *, allow
    p, role:admin, logs, *, *, allow
    p, role:admin, exec, *, */*, allow
    g, internal-admin@nitte.ac.in, role:admin
    g, internal-user@nitte.ac.in, role:readonly
