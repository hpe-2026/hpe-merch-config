# ArgoCD Repository Secret
# Tells ArgoCD how to authenticate to your Git repo.
#
# ⚠️  NEVER commit real credentials. Fill in one of:
#   Option A — HTTPS + token (for GitHub/GitLab):
#     username: your-github-username  (or "x-token" for GitHub PAT)
#     password: <your-PAT-or-token>
#   Option B — SSH key:
#     sshPrivateKey: <base64-encoded-private-key>
#
# Apply BEFORE ArgoCD bootstrap (out-of-band, not tracked by ArgoCD):
#   kubectl apply -f admin-cluster/gitops-system/argocd-repo-secret.yaml
#
# After applying, verify with:
#   argocd repo list

---
apiVersion: v1
kind: Secret
metadata:
  name: hpe-merch-config-repo
  namespace: gitops-system
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  # ── Option A: HTTPS (fill in your GitHub PAT) ───────────────────────────
  type: git
  url: https://github.com/<YOUR_ORG>/HPE-merchendise-config.git
  username: <YOUR_GITHUB_USERNAME>
  password: <YOUR_GITHUB_PAT>

  # ── Option B: SSH (comment out Option A and uncomment below) ─────────────
  # type: git
  # url: git@github.com:<YOUR_ORG>/HPE-merchendise-config.git
  # sshPrivateKey: |
  #   -----BEGIN OPENSSH PRIVATE KEY-----
  #   <paste key here>
  #   -----END OPENSSH PRIVATE KEY-----
