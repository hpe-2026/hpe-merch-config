# ArgoCD — Hub-and-Spoke GitOps engine on the Admin cluster (gitops-system namespace)
#
# BOOTSTRAP ORDER:
#   1. kubectl apply -n gitops-system \
#        -f https://raw.githubusercontent.com/argoproj/argo-cd/v2.10.0/manifests/install.yaml
#   2. kubectl apply -f admin-cluster/gitops-system/argocd-repo-secret.yaml   (out-of-band, fill creds first)
#   3. kubectl apply -f admin-cluster/gitops-system/argocd.yaml               (this file)
#   4. ArgoCD will self-sync and take over managing admin-cluster/ going forward

---
# ──────────────────────────────────────────────────────────────────────────────
# AppProject: admin-cluster
# Scopes what the admin-cluster-apps Application is allowed to deploy.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: admin-cluster
  namespace: gitops-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: "Admin cluster — self-managed infrastructure (Keycloak, MinIO, Thanos, Grafana, ArgoCD, Jenkins)"
  # Only allow pulls from this repo
  sourceRepos:
    - https://github.com/hpe-2026/hpe-merch-config.git
  destinations:
    # Admin cluster itself (in-cluster)
    - server: https://kubernetes.default.svc
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

---
# AppProject: downstream
# Scopes Applications that target dev (56.11) and prod (56.12).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: downstream
  namespace: gitops-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: "Downstream clusters — Dev and Prod application workloads"
  sourceRepos:
    - https://github.com/hpe-2026/hpe-merch-config.git
  destinations:
    - server: https://192.168.56.11:6443
      namespace: "*"
    - server: https://192.168.56.12:6443
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

---
# ──────────────────────────────────────────────────────────────────────────────
# Application: admin-cluster-apps  (THE KEY ONE — self-manages this cluster)
#
# ArgoCD watches admin-cluster/ in Git and applies any change automatically.
# This is the "App of Apps" root — once this is applied, Git is the source
# of truth for everything on the admin cluster.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admin-cluster-apps
  namespace: gitops-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: admin-cluster
  source:
    repoURL: https://github.com/hpe-2026/hpe-merch-config.git
    targetRevision: main
    path: admin-cluster
    # Kustomize picks up admin-cluster/kustomization.yaml automatically
  destination:
    server: https://kubernetes.default.svc   # "in-cluster" — the admin cluster itself
    namespace: gitops-system
  syncPolicy:
    automated:
      prune: true       # removes resources deleted from Git
      selfHeal: true    # reverts manual kubectl edits
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # handles large CRDs (ArgoCD, Thanos) safely
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2
  # Ignore secrets — they are managed out-of-band
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data

---
# ──────────────────────────────────────────────────────────────────────────────
# ArgoCD Ingress — browser access via nip.io (no DNS needed)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: gitops-system
  annotations:
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "256k"
spec:
  ingressClassName: nginx
  rules:
  - host: argocd.192.168.56.10.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 443

---
# ──────────────────────────────────────────────────────────────────────────────
# Downstream Applications — ArgoCD manages dev and prod clusters from here
# Register clusters first:  argocd cluster add <context-name> --name dev
#                           argocd cluster add <context-name> --name prod
# ──────────────────────────────────────────────────────────────────────────────

# Dev cluster — full stack (apps + networking + observability)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-cluster-apps
  namespace: gitops-system
spec:
  project: downstream
  source:
    repoURL: https://github.com/hpe-2026/hpe-merch-config.git
    targetRevision: main
    path: dev-cluster
  destination:
    server: https://192.168.56.11:6443
    namespace: nitte-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2

---
# Prod cluster — full stack (apps + networking + observability)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-cluster-apps
  namespace: gitops-system
spec:
  project: downstream
  source:
    repoURL: https://github.com/hpe-2026/hpe-merch-config.git
    targetRevision: main
    path: prod-cluster
  destination:
    server: https://192.168.56.12:6443
    namespace: nitte-prod
  syncPolicy:
    automated:
      prune: false       # production safety — manual prune
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2
