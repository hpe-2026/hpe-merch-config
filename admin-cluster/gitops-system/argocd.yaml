# ArgoCD — Hub-and-Spoke GitOps engine on the Admin cluster (gitops-system namespace)
#
# BOOTSTRAP ORDER:
#   1. kubectl apply -n gitops-system \
#        -f https://raw.githubusercontent.com/argoproj/argo-cd/v2.10.0/manifests/install.yaml
#   2. kubectl apply -f admin-cluster/gitops-system/argocd-repo-secret.yaml   (out-of-band, fill creds first)
#   3. kubectl apply -f admin-cluster/gitops-system/argocd.yaml               (this file)
#   4. ArgoCD will self-sync and take over managing admin-cluster/ going forward

---
# ──────────────────────────────────────────────────────────────────────────────
# AppProject: admin-cluster
# Scopes what the admin-cluster-apps Application is allowed to deploy.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: admin-cluster
  namespace: gitops-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: "Admin cluster — self-managed infrastructure (Keycloak, MinIO, Thanos, Grafana, ArgoCD, Jenkins)"
  # Only allow pulls from this repo
  sourceRepos:
    - https://github.com/hpe-2026/hpe-merch-config.git
  destinations:
    # Admin cluster itself (in-cluster)
    - server: https://kubernetes.default.svc
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

---
# AppProject: downstream
# Scopes Applications that target dev (56.11) and prod (56.12).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: downstream
  namespace: gitops-system
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: "Downstream clusters — Dev and Prod application workloads"
  sourceRepos:
    - https://github.com/hpe-2026/hpe-merch-config.git
  destinations:
    - server: https://192.168.56.11:6443
      namespace: "*"
    - server: https://192.168.56.12:6443
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

---
# ──────────────────────────────────────────────────────────────────────────────
# Application: admin-cluster-apps  (THE KEY ONE — self-manages this cluster)
#
# ArgoCD watches admin-cluster/ in Git and applies any change automatically.
# This is the "App of Apps" root — once this is applied, Git is the source
# of truth for everything on the admin cluster.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admin-cluster-apps
  namespace: gitops-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: admin-cluster
  source:
    repoURL: https://github.com/hpe-2026/hpe-merch-config.git
    targetRevision: main
    path: admin-cluster
    # Kustomize picks up admin-cluster/kustomization.yaml automatically
  destination:
    server: https://kubernetes.default.svc   # "in-cluster" — the admin cluster itself
    namespace: gitops-system
  syncPolicy:
    automated:
      prune: true       # removes resources deleted from Git
      selfHeal: true    # reverts manual kubectl edits
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # handles large CRDs (ArgoCD, Thanos) safely
    retry:
      limit: 5
      backoff:
        duration: 10s
        maxDuration: 3m
        factor: 2
  # Ignore secrets — they are managed out-of-band
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data

---
# ──────────────────────────────────────────────────────────────────────────────
# ArgoCD Ingress — browser access via nip.io (no DNS needed)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: gitops-system
  annotations:
    # argocd-server runs in INSECURE mode (plain HTTP on container port 8080,
    # exposed as service port 80). nginx must therefore speak plain HTTP to it.
    # backend-protocol HTTPS was wrong here: the pod resets the TLS handshake on
    # its plaintext port -> "peer closed connection in SSL handshake" -> 502.
    # ssl-redirect disabled so browser http:// via nip.io is served directly.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "256k"
spec:
  ingressClassName: nginx
  rules:
  - host: argocd.192.168.56.10.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80

---
# ──────────────────────────────────────────────────────────────────────────────
# Downstream Applications — ArgoCD manages dev and prod clusters from here
# Register clusters first:  argocd cluster add <context-name> --name dev
#                           argocd cluster add <context-name> --name prod-app
# ──────────────────────────────────────────────────────────────────────────────

# App workloads → Dev cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: downstream-dev
  namespace: gitops-system
spec:
  project: downstream
  source:
    repoURL: https://github.com/hpe-2026/hpe-merch-config.git
    targetRevision: main
    path: downstream-clusters/overlays/dev
  destination:
    server: https://192.168.56.11:6443
    namespace: nitte-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  # Secret data is managed out-of-band (SMTP/Slack creds, nitte-secrets).
  # Ignore /data so selfHeal never reverts manually-set credentials to the
  # empty placeholders committed in Git.
  ignoreDifferences:
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
    # StatefulSet VolumeClaimTemplates: Kubernetes defaults storageClassName, volumeMode,
    # and status onto VCTs after creation — these fields are not in Git but always appear
    # on the live object, causing permanent OutOfSync. VCTs are immutable in Kubernetes
    # (can never be changed on an existing StatefulSet) so ignoring the whole array is safe.
    # Also ignore the Istio sidecar status annotation stamped by the webhook.
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
        - /spec/template/metadata/annotations/sidecar.istio.io~1status

---
# App workloads → Prod cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: downstream-prod
  namespace: gitops-system
spec:
  project: downstream
  source:
    repoURL: https://github.com/hpe-2026/hpe-merch-config.git
    targetRevision: main
    path: downstream-clusters/overlays/prod
  destination:
    server: https://192.168.56.12:6443
    namespace: nitte-prod
  syncPolicy:
    automated:
      prune: false      # manual promotion gate for prod
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
# Monitoring agents → Dev cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-agents-dev
  namespace: gitops-system
spec:
  project: downstream
  source:
    repoURL: https://github.com/hpe-2026/hpe-merch-config.git
    targetRevision: main
    path: downstream-clusters/monitoring-agents
  destination:
    server: https://192.168.56.11:6443
    namespace: nitte-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
# Monitoring agents → Prod cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-agents-prod
  namespace: gitops-system
spec:
  project: downstream
  source:
    repoURL: https://github.com/hpe-2026/hpe-merch-config.git
    targetRevision: main
    path: downstream-clusters/monitoring-agents
  destination:
    server: https://192.168.56.12:6443
    namespace: nitte-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
# Istio Addons → Dev cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-addons-dev
  namespace: gitops-system
spec:
  project: downstream
  source:
    repoURL: https://github.com/hpe-2026/hpe-merch-config.git
    targetRevision: main
    path: downstream-clusters/istio-addons
  destination:
    server: https://192.168.56.11:6443
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# Istio Addons → Prod cluster
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-addons-prod
  namespace: gitops-system
spec:
  project: downstream
  source:
    repoURL: https://github.com/hpe-2026/hpe-merch-config.git
    targetRevision: main
    path: downstream-clusters/istio-addons
  destination:
    server: https://192.168.56.12:6443
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
