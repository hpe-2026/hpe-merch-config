apiVersion: 1

groups:
  - orgId: 1
    name: keycloak-security
    folder: Security Alerts
    interval: 1m
    rules:

      - uid: kc-login-failure
        title: "Keycloak Login Failures"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki-ds
            model:
              expr: 'sum(count_over_time({service="keycloak"} |~ "LOGIN_ERROR" [5m]))'
              instant: true
              intervalMs: 60000
              maxDataPoints: 43200
              queryType: instant
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 0s
        annotations:
          summary: "Keycloak login failures detected"
          description: "LOGIN_ERROR events detected in the last 5 minutes"
        labels:
          severity: warning
          category: security
        isPaused: false

      - uid: kc-brute-force
        title: "Keycloak Brute Force Attempt"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: loki-ds
            model:
              expr: 'sum(count_over_time({service="keycloak"} |~ "LOGIN_ERROR" [2m]))'
              instant: true
              intervalMs: 60000
              maxDataPoints: 43200
              queryType: instant
              refId: A
          - refId: B
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 0s
        annotations:
          summary: "Possible brute force attack on Keycloak"
          description: "More than 5 failed login attempts in 2 minutes"
        labels:
          severity: critical
          category: security
        isPaused: false

      - uid: kc-admin-event
        title: "Keycloak Admin Action"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki-ds
            model:
              expr: 'sum(count_over_time({service="keycloak"} |~ "KC-SERVICES" [5m]))'
              instant: true
              intervalMs: 60000
              maxDataPoints: 43200
              queryType: instant
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: B
              type: threshold
        noDataState: OK
        execErrState: Alerting
        for: 0s
        annotations:
          summary: "Keycloak admin operation performed"
          description: "Admin event detected in Keycloak audit logs"
        labels:
          severity: info
          category: audit
        isPaused: false
