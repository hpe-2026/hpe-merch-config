auth_enabled: true

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

# S3-compatible storage via MinIO on the Admin cluster
storage_config:
  aws:
    endpoint: minio.storage-system.svc.cluster.local:9000
    region: us-east-1
    bucketnames: loki-chunks
    access_key_id: loki-user
    secret_access_key: LokiPassword99!
    insecure: true
    s3forcepathstyle: true

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

ruler:
  storage:
    type: s3
    s3:
      endpoint: minio.storage-system.svc.cluster.local:9000
      bucketnames: loki-ruler
      access_key_id: loki-user
      secret_access_key: LokiPassword99!
      insecure: true
      s3forcepathstyle: true
  alertmanager_url: http://alertmanager.observability.svc.cluster.local:9093

query_range:
  align_queries_with_step: true

limits_config:
  retention_period: 744h   # 31 days
  ingestion_rate_mb: 32
  ingestion_burst_size_mb: 64
  reject_old_samples: false
  allow_structured_metadata: true
