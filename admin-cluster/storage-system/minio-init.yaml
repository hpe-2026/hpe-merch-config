apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: storage-system
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-minio
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z minio 9000; do echo "waiting for minio"; sleep 3; done']
      containers:
      - name: minio-init
        image: minio/mc:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: MINIO_ROOT_USER
          value: minioadmin
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: admin-secrets
              key: MINIO_ROOT_PASSWORD
        command:
        - /bin/sh
        - -c
        - |
          echo "Configuring MinIO client..."
          mc alias set local http://minio:9000 minioadmin $MINIO_ROOT_PASSWORD

          echo "Creating application buckets..."
          mc mb local/nitte-products || true
          mc mb local/nitte-users    || true
          mc mb local/nitte-backups  || true

          echo "Creating Loki observability buckets..."
          mc mb local/loki-chunks || true
          mc mb local/loki-ruler  || true
          mc mb local/loki-admin  || true

          echo "Creating Thanos metrics bucket..."
          mc mb local/thanos-metrics || true

          echo "Setting public access for product thumbnails..."
          mc anonymous set download local/nitte-products/thumbnails || true

          echo "Creating Loki service account with least-privilege policy..."
          mc admin user add local loki-user LokiPassword99! || true
          mc admin policy create local loki-policy /dev/stdin <<'EOF'
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Action": ["s3:GetObject","s3:PutObject","s3:DeleteObject","s3:ListBucket"],
              "Resource": ["arn:aws:s3:::loki-*","arn:aws:s3:::loki-*/*"]
            }]
          }
          EOF
          mc admin policy attach local loki-policy --user loki-user || true

          echo "Creating Thanos service account with least-privilege policy..."
          mc admin user add local thanos-user ThanosPassword99! || true
          mc admin policy create local thanos-policy /dev/stdin <<'EOF'
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Action": ["s3:GetObject","s3:PutObject","s3:DeleteObject","s3:ListBucket"],
              "Resource": ["arn:aws:s3:::thanos-*","arn:aws:s3:::thanos-*/*"]
            }]
          }
          EOF
          mc admin policy attach local thanos-policy --user thanos-user || true

          echo "MinIO initialization complete."
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"