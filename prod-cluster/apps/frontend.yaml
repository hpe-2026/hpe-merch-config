apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nitte-prod
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
      - name: wait-for-backend
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z node-backend 3000; do echo "waiting for backend"; sleep 2; done']
      containers:
      - name: frontend
        image: frontend:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5173
        env:
        - name: VITE_API_BASE
          value: "http://localhost:3000"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /
            port: 5173
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: nitte-prod
spec:
  selector:
    app: frontend
  ports:
  - port: 5173
    targetPort: 5173
  type: ClusterIP
