# Prod Cluster Namespace Declarations
---
apiVersion: v1
kind: Namespace
metadata:
  name: nitte-prod
  labels:
    app.kubernetes.io/managed-by: argocd
    cluster-role: prod
    istio-injection: enabled

---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  labels:
    app.kubernetes.io/managed-by: argocd
    cluster-role: prod

---
apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
  labels:
    app.kubernetes.io/managed-by: argocd
    cluster-role: prod
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
