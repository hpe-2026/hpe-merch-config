apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-dashboard
  namespace: nitte
  labels:
    app: admin-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-dashboard
  template:
    metadata:
      labels:
        app: admin-dashboard
    spec:
      initContainers:
      - name: wait-for-backend
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z node-backend 3000; do echo "waiting for backend"; sleep 2; done']
      containers:
      - name: admin-dashboard
        image: admin-dashboard:1.0.0
        imagePullPolicy: Never
        ports:
        - containerPort: 5174
        env:
        - name: VITE_API_BASE
          value: "http://localhost:3000"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /
            port: 5174
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: admin-dashboard
  namespace: nitte
spec:
  selector:
    app: admin-dashboard
  ports:
  - port: 5174
    targetPort: 5174
  type: ClusterIP
