# OWASP Coraza WAF as an Istio WasmPlugin on the ingress gateway.
# Runs inside the existing ingressgateway Envoy (no extra pods / memory).
# Applied out-of-band into istio-system (where the gateway pods live).
#
# Starts in DetectionOnly (logs attacks, blocks nothing) — flip the last
# directive to "SecRuleEngine On" to enforce/block once verified.
apiVersion: extensions.istio.io/v1alpha1
kind: WasmPlugin
metadata:
  name: coraza-waf
  namespace: istio-system
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  url: oci://ghcr.io/corazawaf/coraza-proxy-wasm:0.5.0
  imagePullPolicy: IfNotPresent
  phase: AUTHN
  pluginConfig:
    directives_map:
      default:
        - "Include @recommended-conf"
        - "Include @crs-setup-conf"
        - "Include @owasp_crs/*.conf"
        - "SecRuleEngine On"
    default_directives: default
