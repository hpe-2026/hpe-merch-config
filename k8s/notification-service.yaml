apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: nitte
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
      - name: wait-for-kafka
        image: busybox:1.35
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z kafka 9092; do echo "waiting for kafka"; sleep 2; done']
      containers:
      - name: notification-service
        image: notification-service:1.0.0
        imagePullPolicy: Never
        ports:
        - containerPort: 9100
        env:
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: NOTIFICATION_EMAIL
          value: "notifications@nitte.edu"
        - name: SLACK_ENABLED
          value: "true"
        - name: SLACK_WEBHOOK_URL
          value: ""
        - name: EMAIL_ENABLED
          value: "true"
        - name: EMAIL_PROVIDER
          value: "smtp"
        - name: SMTP_HOST
          value: "smtp.gmail.com"
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_SECURE
          value: "false"
        - name: SMTP_USER
          value: ""
        - name: SMTP_PASS
          value: ""
        - name: SMTP_FROM
          value: "noreply@nitte-merch-shop.com"
        - name: TICKET_ENABLED
          value: "true"
        - name: TICKET_PROVIDER
          value: "console"
        - name: TICKET_ENDPOINT
          value: ""
        - name: KEYCLOAK_ADMIN_EMAILS
          value: "internal-admin@nitte.ac.in"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: nitte
spec:
  selector:
    app: notification-service
  ports:
  - port: 9100
    targetPort: 9100
  type: ClusterIP
