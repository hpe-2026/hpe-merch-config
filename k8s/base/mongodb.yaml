      initContainers:
      - name: wait-for-self-dns
        image: mongo:6.0
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          SELF="$(hostname).mongo-shard1"; MYIP="$(hostname -i)"
          echo "Waiting for $SELF -> $MYIP ..."
          until [ "$(getent hosts "$SELF" | awk '{print $1}' | head -n1)" = "$MYIP" ]; do sleep 2; done
          echo "DNS ready: $SELF -> $MYIP"
      containers:
      - name: mongo-shard1
        image: mongo:6.0
        imagePullPolicy: IfNotPresent
        command: ["mongod", "--shardsvr", "--replSet", "shard1", "--port", "27018", "--bind_ip_all"]
        ports:
        - containerPort: 27018
        volumeMounts:
        - name: mongo-shard1-data
          mountPath: /data/db
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 27018
          initialDelaySeconds: 10
