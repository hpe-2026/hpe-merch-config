# MongoDB Sharded Cluster for Kubernetes (StatefulSets)
#   - Config server (replica set: configRS, port 27017)
#   - Shard 1 (replica set: shard1, port 27018)
#   - Shard 2 (replica set: shard2, port 27019)
#   - Mongos Router (connects to config server, port 27017)
#   - Init Job (initializes replica sets + sharding + users)
#
# Each mongod runs as a StatefulSet behind a headless Service with
# publishNotReadyAddresses: true, so every pod gets STABLE DNS
# (<pod>-0.<svc>) that resolves to its own IP even before it is Ready.
# Replica-set members use that stable DNS, so the cluster re-forms itself
# across restarts/reschedules with NO manual reconfig.

---
# ==================== Config Server ====================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-config
  namespace: nitte
  labels:
    app: mongo-config
spec:
  serviceName: mongo-config
  replicas: 1
  selector:
    matchLabels:
      app: mongo-config
  template:
    metadata:
      labels:
        app: mongo-config
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      initContainers:
      # Block mongod until this pod's own DNS name resolves to its own IP, so the
      # one-shot isSelf check at startup can't lose the race with CoreDNS after a
      # reschedule (otherwise mongod marks itself REMOVED and never recovers).
      - name: wait-for-self-dns
        image: mongo:6.0
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          SELF="$(hostname).mongo-config"; MYIP="$(hostname -i)"
          echo "Waiting for $SELF -> $MYIP ..."
          until [ "$(getent hosts "$SELF" | awk '{print $1}' | head -n1)" = "$MYIP" ]; do sleep 2; done
          echo "DNS ready: $SELF -> $MYIP"
      containers:
      - name: mongo-config
        image: mongo:6.0
        imagePullPolicy: IfNotPresent
        command: ["mongod", "--configsvr", "--replSet", "configRS", "--port", "27017", "--bind_ip_all"]
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-config-data
          mountPath: /data/db
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 30
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 10
  volumeClaimTemplates:
  - metadata:
      name: mongo-config-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-config
  namespace: nitte
spec:
  selector:
    app: mongo-config
  ports:
  - port: 27017
    targetPort: 27017
  clusterIP: None
  publishNotReadyAddresses: true

---
