---
# ==================== Mongos Router ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: nitte
  labels:
    app: mongodb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      initContainers:
      # Initiate config server replica set (stable DNS member), wait for primary
      - name: init-config-rs
        image: mongo:6.0
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          echo "Waiting for mongo-config to accept connections..."
          until mongosh --host mongo-config-0.mongo-config --port 27017 --eval "db.runCommand({ping:1})" >/dev/null 2>&1; do
            echo "mongo-config not ready, retrying in 3s..."
            sleep 3
          done
          echo "mongo-config is reachable!"

          echo "Initiating configRS replica set..."
          mongosh --host mongo-config-0.mongo-config:27017 --eval '
            try {
              rs.initiate({ _id: "configRS", configsvr: true, members: [{ _id: 0, host: "mongo-config-0.mongo-config:27017" }] });
              print("configRS initiated successfully");
            } catch(e) {
              print("configRS already initiated or error: " + e.message);
            }
          '

          echo "Waiting for configRS to elect a primary..."
          for i in $(seq 1 60); do
            if mongosh --host mongo-config-0.mongo-config:27017 --eval 'rs.status().myState' 2>/dev/null | grep -q "1"; then
              echo "configRS has a primary!"
              exit 0
            fi
            echo "Waiting for primary election... ($i/60)"
            sleep 3
          done
          echo "configRS primary elected (or timeout — mongos will retry)"
      containers:
      - name: mongos
        image: mongo:6.0
        imagePullPolicy: IfNotPresent
        command: ["mongos", "--configdb", "configRS/mongo-config-0.mongo-config:27017", "--port", "27017", "--bind_ip_all"]
        ports:
        - containerPort: 27017
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 30
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: nitte
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP

---
# ==================== MongoDB Init Job ====================
# Initializes replica sets (stable DNS members), adds shards, runs sharding-init.js
apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-init
  namespace: nitte
spec:
  backoffLimit: 5
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mongo-init
        image: mongo:6.0
        imagePullPolicy: IfNotPresent
        command:
        - /bin/bash
        - -c
        - |
          set +e
          echo "Waiting for cluster nodes to be reachable..."
          sleep 15

          echo "Initiating config server replica set..."
          mongosh --host mongo-config-0.mongo-config:27017 --eval '
            try {
              rs.initiate({ _id: "configRS", configsvr: true, members: [{ _id: 0, host: "mongo-config-0.mongo-config:27017" }] })
            } catch(e) {
              print("Config RS already initiated: " + e.message)
            }
          '
          sleep 5

          echo "Initiating shard1 replica set..."
          mongosh --host mongo-shard1-0.mongo-shard1:27018 --eval '
            try {
              rs.initiate({ _id: "shard1", members: [{ _id: 0, host: "mongo-shard1-0.mongo-shard1:27018" }] })
            } catch(e) {
              print("Shard1 RS already initiated: " + e.message)
            }
          '
          sleep 5

          echo "Initiating shard2 replica set..."
          mongosh --host mongo-shard2-0.mongo-shard2:27019 --eval '
            try {
              rs.initiate({ _id: "shard2", members: [{ _id: 0, host: "mongo-shard2-0.mongo-shard2:27019" }] })
            } catch(e) {
              print("Shard2 RS already initiated: " + e.message)
            }
          '
          sleep 5

          echo "Adding shards to the cluster via mongos..."
          mongosh --host mongodb:27017 --eval '
            try { sh.addShard("shard1/mongo-shard1-0.mongo-shard1:27018") } catch(e) { print("Shard1 already added: " + e.message) }
            try { sh.addShard("shard2/mongo-shard2-0.mongo-shard2:27019") } catch(e) { print("Shard2 already added: " + e.message) }
          '
          sleep 3

          echo "Running sharding initialization script..."
          mongosh --host mongodb:27017 /scripts/sharding-init.js

          echo "MongoDB sharded cluster initialization complete!"
          exit 0
        volumeMounts:
        - name: sharding-init
          mountPath: /scripts/sharding-init.js
          subPath: sharding-init.js
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
      volumes:
      - name: sharding-init
        configMap:
          name: mongo-sharding-init-config
          items:
          - key: sharding-init.js
            path: sharding-init.js
