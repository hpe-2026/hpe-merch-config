        livenessProbe:
          tcpSocket:
            port: 27018
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 10
  volumeClaimTemplates:
  - metadata:
      name: mongo-shard1-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-shard1
  namespace: nitte
spec:
  selector:
    app: mongo-shard1
  ports:
  - port: 27018
