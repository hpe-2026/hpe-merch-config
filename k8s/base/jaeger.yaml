apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: nitte
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.52
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6831
          protocol: UDP
        - containerPort: 14268
          protocol: TCP
        - containerPort: 16686
          protocol: TCP
        env:
        - name: COLLECTOR_ZIPKIN_HOST_PORT
          value: "9411"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        readinessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: nitte
spec:
  selector:
    app: jaeger
  ports:
  - name: agent-udp
    port: 6831
    targetPort: 6831
    protocol: UDP
  - name: collector
    port: 14268
    targetPort: 14268
    protocol: TCP
  - name: ui
    port: 16686
    targetPort: 16686
    protocol: TCP
  type: ClusterIP
