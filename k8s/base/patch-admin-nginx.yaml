apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-dashboard
spec:
  template:
    spec:
      containers:
        - name: admin-dashboard
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: admin-nginx-conf
