# VirtualService: Backend API
# Routes /api/* traffic to node-backend
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: node-backend-vs
  namespace: nitte
spec:
  hosts:
  - "*"
  gateways:
  - nitte-gateway
  http:
  - match:
    - uri:
        prefix: /api
    route:
    - destination:
        host: node-backend
        port:
          number: 3000
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: gateway-error,connect-failure,refused-stream
---
# VirtualService: Storefront
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: frontend-vs
  namespace: nitte
spec:
  hosts:
  - "*"
  gateways:
  - nitte-gateway
  http:
  - match:
    - uri:
        prefix: /shop
    rewrite:
      uri: /
    route:
    - destination:
        host: frontend
        port:
          number: 5173
---
